<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Detectiv Biblic</title>

<style>
/* ===== CSS EXACT CA AL TĂU (nemodificat) ===== */
* { box-sizing: border-box; }

html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    overflow-x: hidden;
}

body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #111;
    color: white;
    padding: 15px;
    min-height: 100vh;
}

button { cursor: pointer; }

.card {
    background: #222;
    padding: 30px 20px;
    margin: 20px auto;
    border-radius: 12px;
    width: 90%;
    max-width: 380px;
    min-height: 120px;
    display:flex;
    align-items:center;
    justify-content:center;
}

.flipped { background:#f39c12; color:black; }
.impostor { background:#e74c3c !important; }

#timer { font-size:32px; display:none; }
#game { display:none; flex-direction:column; align-items:center; }

#modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); }
#modal.open { display:flex; align-items:center; justify-content:center; }
</style>
</head>

<body>

<h1 id="title">🕵️ Detectiv Biblic</h1>

<div id="setup">

<h3 id="labelPlayers"></h3>
<input id="playerCount" type="number" value="10" min="3">
<button onclick="createInputs()" id="btnCreate"></button>

<div id="players"></div>

<h3 id="labelImpostors"></h3>
<input id="impostors" type="number" value="2" min="1">

<h3 id="labelCategory"></h3>
<select id="category">
  <option value="characters" id="optCharacters"></option>
  <option value="events" id="optEvents"></option>
  <option value="verses" id="optVerses"></option>
</select>

<h3 id="labelTimer"></h3>
<input id="roundTimer" type="number" value="5" min="1">

<button onclick="startGame()" id="btnStart"></button>
<button id="langBtn" onclick="toggleLanguage()">🇬🇧 English</button>

</div>

<div id="game">

<h2 id="playerTurn"></h2>

<div class="card" id="card" onclick="revealRole()"></div>

<button onclick="nextPlayer()" id="nextBtn"></button>

<div id="timerSection">
<h3 id="timerLabel"></h3>
<div id="timer">00:00</div>
<button onclick="startTimer()" id="startTimerBtn"></button>
</div>

<div id="endButtons">
<button onclick="revealAll()" id="revealAllBtn"></button>
<button onclick="newRound()" id="newRoundBtn"></button>
</div>

</div>

<div id="modal" onclick="closeModal(event)">
<div>
<h3 id="modalTitle"></h3>
<ul id="modalList"></ul>
<button onclick="closeModal()" id="closeModalBtn"></button>
</div>
</div>

<script>

/* ================= I18N ================= */
const i18n = {
  ro: {
    players:"Număr jucători",
    create:"Introdu nume",
    impostors:"Număr profeți falși",
    category:"Categorie joc",
    timer:"Timp (minute)",
    start:"Start joc",
    characters:"Personaje biblice",
    events:"Relatări biblice",
    verses:"Versete biblice",
    next:"Următorul jucător",
    reveal:"Apasă AICI ca să dezvălui rolul tău",
    turnSuffix:", e rândul tău",
    ready:"Jocul poate începe 🎉",
    timerLabel:"⏱ Timer rundă",
    startTimer:"Start timp",
    revealAll:"Descoperă toți jucătorii",
    newGame:"Începe joc nou",
    modal:"Rezultate",
    close:"Închide",
    alertReveal:"Dezvăluie rolul!",
    timeUp:"Timpul s-a terminat!",
    confirmNew:"Ești sigur?",
    player:"Jucător",
    impostor:"Ești un Profet fals 😈",
    word:"Este vorba despre: "
  },
  en: {
    players:"Player count",
    create:"Enter names",
    impostors:"False prophets",
    category:"Game category",
    timer:"Time (minutes)",
    start:"Start game",
    characters:"Bible characters",
    events:"Biblical events",
    verses:"Bible verses",
    next:"Next player",
    reveal:"Tap HERE to reveal your role",
    turnSuffix:", it's your turn",
    ready:"Game can start 🎉",
    timerLabel:"⏱ Round timer",
    startTimer:"Start timer",
    revealAll:"Reveal all players",
    newGame:"New game",
    modal:"Results",
    close:"Close",
    alertReveal:"Reveal your role!",
    timeUp:"Time is up!",
    confirmNew:"Are you sure?",
    player:"Player",
    impostor:"You're a false prophet 😈",
    word:"It is about: "
  }
};

let lang="ro";

function t(k){ return i18n[lang][k]; }

/* ================= STATE ================= */
const state = {
  players:[],
  roles:[],
  currentPlayer:0,
  revealed:false,
  roundMinutes:5,
  timer:null
};

/* ================= UPDATE UI ================= */
function updateUI(){

document.getElementById("labelPlayers").textContent=t("players");
document.getElementById("btnCreate").textContent=t("create");
document.getElementById("labelImpostors").textContent=t("impostors");
document.getElementById("labelCategory").textContent=t("category");
document.getElementById("labelTimer").textContent=t("timer");
document.getElementById("btnStart").textContent=t("start");

document.getElementById("optCharacters").textContent=t("characters");
document.getElementById("optEvents").textContent=t("events");
document.getElementById("optVerses").textContent=t("verses");

document.getElementById("nextBtn").textContent=t("next");
document.getElementById("timerLabel").textContent=t("timerLabel");
document.getElementById("startTimerBtn").textContent=t("startTimer");
document.getElementById("revealAllBtn").textContent=t("revealAll");
document.getElementById("newRoundBtn").textContent=t("newGame");

document.getElementById("modalTitle").textContent=t("modal");
document.getElementById("closeModalBtn").textContent=t("close");

document.getElementById("langBtn").textContent =
 lang==="ro"?"🇬🇧 English":"🇷🇴 Română";

document.getElementById("card").textContent=t("reveal");
}

/* ================= LANGUAGE ================= */
function toggleLanguage(){
 lang = lang==="ro"?"en":"ro";
 document.documentElement.lang=lang;
 updateUI();

 if(state.players.length){
   document.getElementById("playerTurn").textContent =
     state.players[state.currentPlayer] + t("turnSuffix");
 }
}

/* ================= GAME ================= */
function createInputs(){
 const c=+playerCount.value;
 players.innerHTML="";
 for(let i=0;i<c;i++){
   let iel=document.createElement("input");
   iel.placeholder=t("player")+" "+(i+1);
   players.appendChild(iel);
 }
}

function startGame(){
 state.players=[...document.querySelectorAll("#players input")]
 .map(i=>i.value||t("player"));

 state.currentPlayer=0;
 state.revealed=false;

 card.textContent=t("reveal");
 game.style.display="flex";
 setup.style.display="none";

 updateTurn();
}

function updateTurn(){
 playerTurn.textContent=
 state.players[state.currentPlayer]+t("turnSuffix");
}

function revealRole(){
 if(state.revealed) return;

 card.textContent=t("word")+"X";
 state.revealed=true;
}

function nextPlayer(){
 if(!state.revealed){
  alert(t("alertReveal"));
  return;
 }

 state.currentPlayer++;
 state.revealed=false;
 card.textContent=t("reveal");

 if(state.currentPlayer>=state.players.length){
  playerTurn.textContent=t("ready");
  return;
 }

 updateTurn();
}

function revealAll(){
 alert("OK");
}

function startTimer(){
 alert("timer");
}

function newRound(){
 if(!confirm(t("confirmNew"))) return;
 location.reload();
}

/* INIT */
updateUI();

</script>
</body>
</html>
