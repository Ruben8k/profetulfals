<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detectiv Biblic</title>

<style>
body{
    font-family:Arial;
    text-align:center;
    background:#111;
    color:white;
    margin:0;
    padding:60px 15px 15px;
}

#langToggle{
    position:fixed;
    top:15px;
    right:15px;
    z-index:200;
    width:auto;
    margin:0;
    padding:10px 14px;
    border-radius:8px;
    border:none;
    background:#222;
    color:white;
    cursor:pointer;
}

#langToggle:hover{
    background:#333;
}

button,input,select{
    font-size:18px;
    padding:10px;
    margin:8px;
    border-radius:8px;
    border:none;
}

button{
    background:#222;
    color:white;
    width:85%;
    max-width:350px;
    cursor:pointer;
}

button:hover{
    background:#333;
}

.card{
    background:#222;
    padding:40px;
    margin:25px auto;
    border-radius:12px;
    max-width:380px;
    cursor:pointer;
    transition:.6s;
}

.flipped{
    background:#f39c12;
    color:black;
}

.impostor{
    background:#e74c3c!important;
    color:white!important;
}

#timer{
    font-size:28px;
    margin-top:10px;
    display:none;
}

#timer.expired{
    color:#e74c3c;
}

#endButtons{
    display:none;
    flex-direction:column;
    align-items:center;
}

/* Modal overlay */
#modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.75);
    z-index:100;
    align-items:center;
    justify-content:center;
}

#modal.open{
    display:flex;
}

#modalBox{
    background:#222;
    border-radius:14px;
    padding:28px 24px;
    max-width:360px;
    width:90%;
    text-align:left;
}

#modalBox h3{
    margin:0 0 16px;
    font-size:20px;
    text-align:center;
}

#modalList{
    list-style:none;
    padding:0;
    margin:0 0 20px;
}

#modalList li{
    padding:8px 0;
    border-bottom:1px solid #333;
    font-size:16px;
}

#modalList li:last-child{
    border-bottom:none;
}

.impostor-label{
    color:#e74c3c;
    font-weight:bold;
}

#modalClose{
    width:100%;
    background:#f39c12;
    color:black;
    font-weight:bold;
    border-radius:8px;
    padding:12px;
    font-size:16px;
    cursor:pointer;
    border:none;
}
</style>
</head>

<body>

<button id="langToggle" type="button" onclick="toggleLanguage()">EN</button>

<h1 id="title">🕵️ Detectiv Biblic</h1>

<div id="setup">
<h3 id="labelPlayers">Număr jucători</h3>
<input type="number" id="playerCount" value="10" min="3">
<br>
<button id="btnCreateInputs" onclick="createInputs()">Introdu nume</button>

<div id="players"></div>

<h3 id="labelImpostors">Număr profeţi falși</h3>
<input type="number" id="impostors" value="2" min="1">

<h3 id="labelCategory">Categorie joc</h3>
<select id="category">
  <option value="characters">Personaje biblice</option>
  <option value="events">Relatări biblice</option>
  <option value="verses">Versete biblice</option>
</select>

<h3 id="labelTimer">Timp (minute)</h3>
<input type="number" id="roundTimer" value="5" min="1">

<br>
<button id="btnStartGame" onclick="startGame()">Start joc</button>
</div>

<div id="game" style="display:none;">

<h2 id="playerTurn"></h2>

<div id="card" class="card" onclick="revealRole()">
Apasă AICI ca să dezvălui rolul tău
</div>

<button id="nextBtn" onclick="nextPlayer()">Următorul jucător</button>

<div id="timerSection" style="display:none;">
<h3 id="labelTimerSection">⏱ Timer rundă</h3>
<div id="timer">00:00</div>
<button id="startTimerBtn" onclick="startTimer()">Start Timp</button>
</div>

<div id="endButtons">
<button id="btnRevealAll" onclick="revealAll()">Descoperă toți jucătorii</button>
<button id="btnNewRound" onclick="newRound()">Începe joc nou</button>
</div>

</div>

<!-- Modal rezultate -->
<div id="modal">
  <div id="modalBox">
    <h3 id="modalTitle">🔍 Rezultate</h3>
    <ul id="modalList"></ul>
    <button id="modalClose" onclick="closeModal()">Închide</button>
  </div>
</div>

<!-- AUDIO LOCAL -->
<audio id="dramaticSound" src="sounds/dramatic.mp3"></audio>
<audio id="endSound" src="sounds/final.mp3"></audio>

<script>

const categories = {

characters: [
    "Sara",
    "Rebeca",
    "Iosua",
    "Daniel",
    "Iefta judecătorul",
    "Samson",
    "Abigail",
    "Neemia",
    "Saul din Tars",
    "Ioan Botezatorul",
    "Rut",
    "Maria mama lui Isus",
    "Lazăr",
    "Moise",
    "Avraam",
    "Isaac",
    "Iacov",
    "Iosif - fiul lui Iacob",
    "David",
    "Solomon",
    "Ilie",
    "Elisei",
    "Estera",
    "Iov",
    "Ezra",
    "Maria Magdalena",
    "Petru",
    "Pavel",
    "Timotei",
    "Manase",
    "Ahab",
    "Izabela",
    "Abel",
    "Noe",
    "Faraon",
    "Iuda Iscarioteanul",
    "Absalom","Cain",
    "Lot",
    "Ghedeon",
    "Marta",
    "Toma"
],

events: [
    "Penticosta din 33 e.n.",
    "Exodul din Egipt",
    "Căderea Ierihonului",
    "Arca lui Noe",
    "Trecerea Mării Roșii",
    "David și Goliat",
    "Nașterea lui Isus",
    "Învierea lui Isus",
    "Comemorarea morții lui Isus",
    "Turnul Babel",
    "Soția lui Lot se face stalp de sare",
    "Daniel in groapa cu lei",
    "Isus curăță templul de talhari",
    "Armaghedon",
    "Creerea pamantului",
    "Căderea lui Adam și Eva",
    "Cain il ucide pe Abel",
    "Potopul",
    "Distrugerea Sodomei si Gomorei",
    "Jertfirea lui Isaac",
    "Vanzarea lui Iosif in Egipt",
    "Cele 10 plagi ale Egiptului",
    "Vitelul de aur",
    "Sarpele de arama",
    "Ridicarea lui Ilie la cer",
    "Botezul lui Isus",
    "Ispitirea in pustiu",
    "Predica de pe munte",
    "Intrarea in Ierusalim",
    "Rugaciunea din Ghetsimani",
    "Tradarea lui Iuda",
    "Convertirea lui Saul",
    "Botezul eunucului etiopian",
    "Eliberarea lui Petru din inchisoare"
],

verses: [
"Ioan 3:16",
"Psalmul 37:29",
"Matei 5:3",
"Proverbe 3:5",
"Filipeni 4:6",
"Romani 8:38,39",
"Isaia 41:10",
"Psalmul 119:105",
"Matei 6:33",
"Faptele 20:35",
"2 Timotei 3:1-5",
"Daniel 2:44",
"2 Timotei 3:16, 17",
"Proverbele 3:5, 6",
"Matei 28:19, 20",
"Efeseni 5:22, 23",
"2 Petru 3:8",
"Eclesiastul 9:5",
"Psalmul 83:18",
"1 Ioan 4:8",
"Ioan 17:3",
"Ioan 5:28, 29",
"Matei 24:14",
"Romani 5:12",
"Iacov 4:8",
"Matei 6:9, 10",
"Isaia 55:11",
"Efeseni 5:33",
"Isaia 65:21-23",
"Ioan 13:35",
"Galateni 5:22, 23",
"Geneza 1:1",
"Revelatia 21:4"
]

};

const translations = {
  ro: {
    title: "Detectiv Biblic",
    players: "Număr jucători",
    enterNames: "Introdu nume",
    impostors: "Număr profeţi falși",
    category: "Categorie joc",
    timer: "Timp (minute)",
    start: "Start joc",
    cardPrompt: "Apasă AICI ca să dezvălui rolul tău",
    next: "Următorul jucător",
    roundTimer: "⏱ Timer rundă",
    startTimer: "Start Timp",
    revealAll: "Descoperă toți jucătorii",
    newRound: "Începe joc nou",
    results: "🔍 Rezultate",
    close: "Închide",
    playerTurnSuffix: ", e rândul tău",
    ready: "Jocul poate începe 🎉",
    min3: "Minim 3 jucători!",
    min1: "Trebuie cel puțin 1 impostor!",
    revealRoleAlert: "Dezvăluie rolul!",
    timeUp: "Timpul s-a terminat!",
    confirmNewRound: "Ești sigur că vrei să începi un joc nou? Jocul curent se va pierde.",
    playerPlaceholder: "Jucător",
    languageToggle: "EN",
    categoryCharacters: "Personaje biblice",
    categoryEvents: "Relatări biblice",
    categoryVerses: "Versete biblice"
  },
  en: {
    title: "Biblical Detective",
    players: "Player count",
    enterNames: "Enter names",
    impostors: "Number of false prophets",
    category: "Game category",
    timer: "Time (minutes)",
    start: "Start game",
    cardPrompt: "Tap HERE to reveal your role",
    next: "Next player",
    roundTimer: "⏱ Round timer",
    startTimer: "Start timer",
    revealAll: "Reveal all players",
    newRound: "New game",
    results: "🔍 Results",
    close: "Close",
    playerTurnSuffix: ", it's your turn",
    ready: "Game can start 🎉",
    min3: "Minimum 3 players!",
    min1: "There must be at least 1 impostor!",
    revealRoleAlert: "Reveal your role!",
    timeUp: "Time is up!",
    confirmNewRound: "Are you sure you want to start a new game? Current game will be lost.",
    playerPlaceholder: "Player",
    languageToggle: "RO",
    categoryCharacters: "Bible characters",
    categoryEvents: "Biblical events",
    categoryVerses: "Bible verses"
  }
};

const state = {
  players: [],
  roles: [],
  currentPlayer: 0,
  revealed: false,
  timerInterval: null,
  roundMinutes: 5,
  timeLeft: 0,
  lastImpostors: [],
  language: "ro"
};

function setLanguage(lang) {
  state.language = lang;
  const t = translations[lang];

  document.title = t.title;
  document.getElementById("title").textContent = "🕵️ " + t.title;
  document.getElementById("labelPlayers").textContent = t.players;
  document.getElementById("btnCreateInputs").textContent = t.enterNames;
  document.getElementById("labelImpostors").textContent = t.impostors;
  document.getElementById("labelCategory").textContent = t.category;
  document.getElementById("labelTimer").textContent = t.timer;
  document.getElementById("btnStartGame").textContent = t.start;
  document.getElementById("labelTimerSection").textContent = t.roundTimer;
  document.getElementById("startTimerBtn").textContent = t.startTimer;
  document.getElementById("btnRevealAll").textContent = t.revealAll;
  document.getElementById("btnNewRound").textContent = t.newRound;
  document.getElementById("modalTitle").textContent = t.results;
  document.getElementById("modalClose").textContent = t.close;
  document.getElementById("langToggle").textContent = t.languageToggle;

  const categorySelect = document.getElementById("category");
  const selectedValue = categorySelect.value;
  categorySelect.innerHTML = `
    <option value="characters">${t.categoryCharacters}</option>
    <option value="events">${t.categoryEvents}</option>
    <option value="verses">${t.categoryVerses}</option>
  `;
  categorySelect.value = selectedValue;

  if (!state.revealed) {
    document.getElementById("card").textContent = t.cardPrompt;
  }
  updatePlayerPlaceholders();
  if (state.players.length && state.currentPlayer < state.players.length) {
    updateTurn();
  } else if (state.currentPlayer >= state.players.length) {
    document.getElementById("playerTurn").textContent = t.ready;
  }
}

function toggleLanguage() {
  setLanguage(state.language === "ro" ? "en" : "ro");
}

function updatePlayerPlaceholders() {
  const inputs = document.querySelectorAll("#players input");
  inputs.forEach((input, index) => {
    input.placeholder = `${translations[state.language].playerPlaceholder} ${index + 1}`;
  });
}

function createInputs() {
  const count = parseInt(document.getElementById("playerCount").value);

  if (isNaN(count) || count < 3) {
    alert(translations[state.language].min3);
    return;
  }

  const div = document.getElementById("players");
  const old = [];
  for (let i = 0; i < count; i++) {
    const el = document.getElementById("p" + i);
    old.push(el ? el.value : "");
  }

  div.innerHTML = "";
  for (let i = 0; i < count; i++) {
    const input = document.createElement("input");
    input.id = "p" + i;
    input.placeholder = `${translations[state.language].playerPlaceholder} ${i + 1}`;
    input.value = old[i] || "";
    div.appendChild(input);
    div.appendChild(document.createElement("br"));
  }
}

function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
}

function startGame() {
  const count = parseInt(document.getElementById("playerCount").value);
  const impostorCount = parseInt(document.getElementById("impostors").value);

  // Validări
  if (isNaN(count) || count < 3) {
    alert(translations[state.language].min3);
    return;
  }
  if (isNaN(impostorCount) || impostorCount < 1) {
    alert(translations[state.language].min1);
    return;
  }

  state.players = [];
  for (let i = 0; i < count; i++) {
    const el = document.getElementById("p" + i);
    state.players.push(el ? (el.value.trim() || `${translations[state.language].playerPlaceholder} ${i + 1}`) : `${translations[state.language].playerPlaceholder} ${i + 1}`);
  }

  state.roundMinutes = parseInt(document.getElementById("roundTimer").value) || 5;

  const selectedCategory = document.getElementById("category").value;
  const list = categories[selectedCategory];
  const word = list[Math.floor(Math.random() * list.length)];

  state.roles = state.players.map(() => (state.language === "en" ? "It is about: " : "Este vorba despre: ") + word);

  const impostorSlots = Math.min(impostorCount, state.players.length);

  // Candidati care nu au fost impostori runda trecuta
  let eligible = state.players
    .map((name, i) => ({ name, i }))
    .filter(p => !state.lastImpostors.includes(p.name));

  // Daca nu sunt destui candidati eligibili, completam cu restul
  if (eligible.length < impostorSlots) {
    const rest = state.players
      .map((name, i) => ({ name, i }))
      .filter(p => !eligible.find(e => e.i === p.i));
    eligible = [...eligible, ...rest];
  }

  shuffle(eligible);
  const chosen = eligible.slice(0, impostorSlots);
  chosen.forEach(p => { state.roles[p.i] = state.language === "en" ? "You're a false prophet 😈" : "Ești un Profet fals 😈"; });
  state.lastImpostors = chosen.map(p => p.name);

  shuffle(state.roles);

  document.getElementById("setup").style.display = "none";
  document.getElementById("game").style.display = "block";

  state.currentPlayer = 0;
  state.revealed = false;

  updateTurn();
}

function updateTurn() {
  const suffix = translations[state.language].playerTurnSuffix;
  document.getElementById("playerTurn").textContent =
    state.players[state.currentPlayer] + suffix;
}

function revealRole() {
  if (state.revealed) return;

  const card = document.getElementById("card");
  card.textContent = state.roles[state.currentPlayer];

  if (state.roles[state.currentPlayer].includes("Profet") || state.roles[state.currentPlayer].includes("prophet"))
    card.classList.add("impostor");
  else
    card.classList.add("flipped");

  document.getElementById("dramaticSound").play().catch(() => {});
  state.revealed = true;
}

function nextPlayer() {
  if (!state.revealed) {
    alert(translations[state.language].revealRoleAlert);
    return;
  }

  const card = document.getElementById("card");
  card.classList.remove("flipped", "impostor");
  card.textContent = translations[state.language].cardPrompt;

  state.revealed = false;
  state.currentPlayer++;

  if (state.currentPlayer >= state.players.length) {
    document.getElementById("playerTurn").textContent = translations[state.language].ready;
    document.getElementById("card").style.display = "none";
    document.getElementById("nextBtn").style.display = "none";
    document.getElementById("timerSection").style.display = "block";
    document.getElementById("endButtons").style.display = "flex";
    return;
  }

  updateTurn();
}

function startTimer() {
  clearInterval(state.timerInterval);

  const timerEl = document.getElementById("timer");
  timerEl.classList.remove("expired");
  state.timeLeft = state.roundMinutes * 60;
  timerEl.style.display = "block";
  document.getElementById("startTimerBtn").style.display = "none";

  state.timerInterval = setInterval(() => {
    state.timeLeft--;

    const m = Math.floor(state.timeLeft / 60);
    const s = state.timeLeft % 60;

    timerEl.textContent =
      `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;

    if (state.timeLeft <= 0) {
      clearInterval(state.timerInterval);
      timerEl.classList.add("expired");
      document.getElementById("endSound").play().catch(() => {});
      alert(translations[state.language].timeUp);
    }
  }, 1000);
}

function revealAll() {
  const list = document.getElementById("modalList");
  list.innerHTML = "";

  state.players.forEach((p, i) => {
    const li = document.createElement("li");
    const isImpostor = state.roles[i].includes("Profet") || state.roles[i].includes("prophet");
    li.innerHTML = `<strong>${p}</strong> → <span class="${isImpostor ? 'impostor-label' : ''}">${state.roles[i]}</span>`;
    list.appendChild(li);
  });

  document.getElementById("modal").classList.add("open");
}

function closeModal() {
  document.getElementById("modal").classList.remove("open");
}

// Închide modal dacă se apasă în afara lui
document.getElementById("modal").addEventListener("click", function(e) {
  if (e.target === this) closeModal();
});

function newRound() {
  if (!confirm(translations[state.language].confirmNewRound)) return;

  clearInterval(state.timerInterval);

  const timerEl = document.getElementById("timer");
  timerEl.textContent = "00:00";
  timerEl.style.display = "none";
  timerEl.classList.remove("expired");

  document.getElementById("startTimerBtn").style.display = "inline-block";
  document.getElementById("setup").style.display = "block";
  document.getElementById("game").style.display = "none";
  document.getElementById("card").style.display = "block";
  document.getElementById("nextBtn").style.display = "inline-block";
  document.getElementById("endButtons").style.display = "none";
  document.getElementById("timerSection").style.display = "none";
}

setLanguage(state.language);

</script>
</body>
</html>
