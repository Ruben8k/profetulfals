<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detectiv Biblic</title>

<style>
body{
    font-family:Arial;
    text-align:center;
    background:#111;
    color:white;
    margin:0;
    padding:60px 15px 15px;
}

#langToggle{
    position:fixed;
    top:15px;
    right:15px;
    z-index:200;
    background:#222;
    color:white;
    border:none;
    padding:10px 14px;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

#langToggle:hover{
    background:#333;
}

button,input,select{
    font-size:18px;
    padding:10px;
    margin:8px;
    border-radius:8px;
    border:none;
}

button{
    background:#222;
    color:white;
    width:85%;
    max-width:350px;
    cursor:pointer;
}

button:hover{
    background:#333;
}

.card{
    background:#222;
    padding:40px;
    margin:25px auto;
    border-radius:12px;
    max-width:380px;
    cursor:pointer;
    transition:.6s;
}

.flipped{
    background:#f39c12;
    color:black;
}

.impostor{
    background:#e74c3c!important;
    color:white!important;
}

#timer{
    font-size:28px;
    margin-top:10px;
    display:none;
}

#timer.expired{
    color:#e74c3c;
}

#endButtons{
    display:none;
    flex-direction:column;
    align-items:center;
}

/* Modal overlay */
#modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.75);
    z-index:100;
    align-items:center;
    justify-content:center;
}

#modal.open{
    display:flex;
}

#modalBox{
    background:#222;
    border-radius:14px;
    padding:28px 24px;
    max-width:360px;
    width:90%;
    text-align:left;
}

#modalBox h3{
    margin:0 0 16px;
    font-size:20px;
    text-align:center;
}

#modalList{
    list-style:none;
    padding:0;
    margin:0 0 20px;
}

#modalList li{
    padding:8px 0;
    border-bottom:1px solid #333;
    font-size:16px;
}

#modalList li:last-child{
    border-bottom:none;
}

.impostor-label{
    color:#e74c3c;
    font-weight:bold;
}

#modalClose{
    width:100%;
    background:#f39c12;
    color:black;
    font-weight:bold;
    border-radius:8px;
    padding:12px;
    font-size:16px;
    cursor:pointer;
    border:none;
}
</style>
</head>

<body>

<button id="langToggle" type="button" onclick="toggleLanguage()"></button>

<h1 id="title"></h1>

<div id="setup">
<h3 id="labelPlayers"></h3>
<input type="number" id="playerCount" value="10" min="3">
<br>
<button id="btnCreateInputs" onclick="createInputs()"></button>

<div id="players"></div>

<h3 id="labelImpostors"></h3>
<input type="number" id="impostors" value="2" min="1">

<h3 id="labelCategory"></h3>
<select id="category">
  <option value="characters" id="optCharacters"></option>
  <option value="events" id="optEvents"></option>
  <option value="verses" id="optVerses"></option>
</select>

<h3 id="labelTimer"></h3>
<input type="number" id="roundTimer" value="5" min="1">

<br>
<button id="btnStartGame" onclick="startGame()"></button>
</div>

<div id="game" style="display:none;">

<h2 id="playerTurn"></h2>

<div id="card" class="card" onclick="revealRole()"></div>

<button id="nextBtn" onclick="nextPlayer()"></button>

<div id="timerSection" style="display:none;">
<h3 id="labelTimerSection"></h3>
<div id="timer">00:00</div>
<button id="startTimerBtn" onclick="startTimer()"></button>
</div>

<div id="endButtons">
<button id="btnRevealAll" onclick="revealAll()"></button>
<button id="btnNewRound" onclick="newRound()"></button>
</div>

</div>

<!-- Modal rezultate -->
<div id="modal">
  <div id="modalBox">
    <h3 id="modalTitle"></h3>
    <ul id="modalList"></ul>
    <button id="modalClose" onclick="closeModal()"></button>
  </div>
</div>

/* AUDIO UNLOCK (IMPORTANT MOBILE) */

/**
 * Actualizează toate textele UI în funcție de limba curentă
 */
function updateUIText() {
  const t = translations[state.language];
  
  document.title = "Detectiv Biblic";
  document.documentElement.lang = state.language;
  document.getElementById("title").textContent = t.title;
  document.getElementById("labelPlayers").textContent = t.labelPlayers;
  document.getElementById("btnCreateInputs").textContent = t.btnCreateInputs;
  document.getElementById("labelImpostors").textContent = t.labelImpostors;
  document.getElementById("labelCategory").textContent = t.labelCategory;
  document.getElementById("labelTimer").textContent = t.labelTimer;
  document.getElementById("btnStartGame").textContent = t.btnStartGame;
  document.getElementById("labelTimerSection").textContent = t.labelTimerSection;
  document.getElementById("startTimerBtn").textContent = t.startTimer;
  document.getElementById("btnRevealAll").textContent = t.btnRevealAll;
  document.getElementById("btnNewRound").textContent = t.btnNewRound;
  document.getElementById("modalTitle").textContent = t.modalTitle;
  document.getElementById("modalClose").textContent = t.modalClose;
  document.getElementById("langToggle").textContent = t.langToggle;

  document.getElementById("optCharacters").textContent = t.categoryCharacters;
  document.getElementById("optEvents").textContent = t.categoryEvents;
  document.getElementById("optVerses").textContent = t.categoryVerses;

  updatePlayerPlaceholders();
  
  // Dacă jocul e în curs, reactualizează cardurile
  if (state.word && state.roles.length > 0) {
    regenerateRoleTexts();
    if (!state.revealed) {
      document.getElementById("card").textContent = t.cardPrompt;
    } else {
      document.getElementById("card").textContent = state.roles[state.currentPlayer].displayText;
    }
    if (state.currentPlayer < state.players.length) {
      updateTurn();
    }
  } else {
    document.getElementById("card").textContent = t.cardPrompt;
  }
}

/**
 * Schimbă limba și actualiza toate textele
 */
function toggleLanguage() {
  state.language = state.language === "ro" ? "en" : "ro";
  updateUIText();
}

/**
 * Actualizează placeholder-urile pentru input-uri de jucători
 */
function updatePlayerPlaceholders() {
  const inputs = document.querySelectorAll("#players input");
  const t = translations[state.language];
  inputs.forEach((input, index) => {
    input.placeholder = `${t.playerPlaceholder} ${index + 1}`;
  });
}

/**
 * Regenerează textele de display pentru roluri (când se schimbă limba)
 */
function regenerateRoleTexts() {
  const t = translations[state.language];
  state.roles.forEach(role => {
    if (role.isImpostor) {
      role.displayText = t.impostorRole;
    } else {
      role.displayText = t.wordRolePrefix + role.word;
    }
  });
}

/**
 * Creează input-uri pentru nume jucători
 */
function createInputs() {
  const count = parseInt(document.getElementById("playerCount").value);
  const t = translations[state.language];

  if (isNaN(count) || count < 3) {
    alert(t.alertMin3);
    return;
  }

  const div = document.getElementById("players");
  const old = [];
  for (let i = 0; i < count; i++) {
    const el = document.getElementById("p" + i);
    old.push(el ? el.value : "");
  }

  div.innerHTML = "";
  for (let i = 0; i < count; i++) {
    const input = document.createElement("input");
    input.id = "p" + i;
    input.placeholder = `${t.playerPlaceholder} ${i + 1}`;
    input.value = old[i] || "";
    div.appendChild(input);
    div.appendChild(document.createElement("br"));
  }
}

/**
 * Fisher-Yates shuffle
 */
function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
}

/**
 * Pornește jocul
 */
function startGame() {
  const count = parseInt(document.getElementById("playerCount").value);
  const impostorCount = parseInt(document.getElementById("impostors").value);
  const t = translations[state.language];

  if (isNaN(count) || count < 3) {
    alert(t.alertMin3);
    return;
  }
  if (isNaN(impostorCount) || impostorCount < 1) {
    alert(t.alertMin1Impostor);
    return;
  }

  // Colectează nume jucători
  state.players = [];
  for (let i = 0; i < count; i++) {
    const el = document.getElementById("p" + i);
    const name = el ? el.value.trim() : "";
    state.players.push(name || `${t.playerPlaceholder} ${i + 1}`);
  }

  state.roundMinutes = parseInt(document.getElementById("roundTimer").value) || 5;

  // Selectează cuvântul din categoria și limba curenți
  const selectedCategory = document.getElementById("category").value;
  const list = categories[selectedCategory][state.language];
  state.word = list[Math.floor(Math.random() * list.length)];

  // Inițializează roluri (toți sunt regular player inițial)
  state.roles = state.players.map(() => ({
    word: state.word,
    isImpostor: false,
    displayText: t.wordRolePrefix + state.word
  }));

  const impostorSlots = Math.min(impostorCount, state.players.length);

  // Alege impostori (evitând pe cei din runda anterioară)
  let eligible = state.players
    .map((name, i) => ({ name, i }))
    .filter(p => !state.lastImpostors.includes(p.name));

  if (eligible.length < impostorSlots) {
    const rest = state.players
      .map((name, i) => ({ name, i }))
      .filter(p => !eligible.find(e => e.i === p.i));
    eligible = [...eligible, ...rest];
  }

  shuffle(eligible);
  const chosen = eligible.slice(0, impostorSlots);

  // Marchează impostori
  chosen.forEach(p => {
    state.roles[p.i].isImpostor = true;
    state.roles[p.i].displayText = t.impostorRole;
  });

  state.lastImpostors = chosen.map(p => p.name);

  // SHUFFLE ROLURILE (nu schimbă indexurile jucătorilor, doar ordinea afișării)
  shuffle(state.roles);

  document.getElementById("setup").style.display = "none";
  document.getElementById("game").style.display = "block";

  state.currentPlayer = 0;
  state.revealed = false;

  updateTurn();
  document.getElementById("card").textContent = t.cardPrompt;
}

/**
 * Actualizează textul de tur
 */
function updateTurn() {
  const t = translations[state.language];
  document.getElementById("playerTurn").textContent =
    state.players[state.currentPlayer] + t.playerTurnSuffix;
}

/**
 * Dezvăluie rolul jucătorului curent
 */
function revealRole() {
  if (state.revealed) return;

  const card = document.getElementById("card");
  const currentRole = state.roles[state.currentPlayer];
  card.textContent = currentRole.displayText;

  if (currentRole.isImpostor) {
    card.classList.add("impostor");
  } else {
    card.classList.add("flipped");
  }

  document.getElementById("dramaticSound").play().catch(() => {});
  state.revealed = true;
}

/**
 * Trece la următorul jucător
 */
function nextPlayer() {
  const t = translations[state.language];
  if (!state.revealed) {
    alert(t.alertRevealRole);
    return;
  }

  const card = document.getElementById("card");
  card.classList.remove("flipped", "impostor");
  card.textContent = t.cardPrompt;

  state.revealed = false;
  state.currentPlayer++;

  if (state.currentPlayer >= state.players.length) {
    document.getElementById("playerTurn").textContent = t.playerReady;
    document.getElementById("card").style.display = "none";
    document.getElementById("nextBtn").style.display = "none";
    document.getElementById("timerSection").style.display = "block";
    document.getElementById("endButtons").style.display = "flex";
    return;
  }

  updateTurn();
}

/**
 * Pornește timer-ul
 */
function startTimer() {
  clearInterval(state.timerInterval);

  const timerEl = document.getElementById("timer");
  timerEl.classList.remove("expired");
  state.timeLeft = state.roundMinutes * 60;
  timerEl.style.display = "block";
  document.getElementById("startTimerBtn").style.display = "none";

  state.timerInterval = setInterval(() => {
    state.timeLeft--;

    const m = Math.floor(state.timeLeft / 60);
    const s = state.timeLeft % 60;

    timerEl.textContent =
      `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;

    if (state.timeLeft <= 0) {
      clearInterval(state.timerInterval);
      timerEl.classList.add("expired");
      document.getElementById("endSound").play().catch(() => {});
      const t = translations[state.language];
      alert(t.alertTimeUp);
    }
  }, 1000);
}

/**
 * Dezvăluie toți jucătorii și rolurile lor
 */
function revealAll() {
  const list = document.getElementById("modalList");
  list.innerHTML = "";

  state.players.forEach((p, i) => {
    const li = document.createElement("li");
    const role = state.roles[i];
    li.innerHTML = `<strong>${p}</strong> → <span class="${role.isImpostor ? 'impostor-label' : ''}">${role.displayText}</span>`;
    list.appendChild(li);
  });

  document.getElementById("modal").classList.add("open");
}

/**
 * Închide modal-ul
 */
function closeModal() {
  document.getElementById("modal").classList.remove("open");
}

/**
 * Detecție click în afara modal-ului
 */
document.getElementById("modal").addEventListener("click", function(e) {
  if (e.target === this) closeModal();
});

/**
 * Pornește o nouă rundă
 */
function newRound() {
  const t = translations[state.language];
  if (!confirm(t.alertConfirmNewRound)) return;

  clearInterval(state.timerInterval);

  const timerEl = document.getElementById("timer");
  timerEl.textContent = "00:00";
  timerEl.style.display = "none";
  timerEl.classList.remove("expired");

  document.getElementById("startTimerBtn").style.display = "inline-block";
  document.getElementById("setup").style.display = "block";
  document.getElementById("game").style.display = "none";
  document.getElementById("card").style.display = "block";
  document.getElementById("nextBtn").style.display = "inline-block";
  document.getElementById("endButtons").style.display = "none";
  document.getElementById("timerSection").style.display = "none";
  document.getElementById("card").textContent = t.cardPrompt;
}

// Inițializare - actualizeaza UI la pornire
updateUIText();

</script>
