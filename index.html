<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detectiv Biblic</title>

<style>
body{
    font-family:Arial;
    text-align:center;
    background:#111;
    color:white;
    margin:0;
    padding:15px;
}

button,input{
    font-size:18px;
    padding:10px;
    margin:8px;
    border-radius:8px;
    border:none;
}

button{
    background:#222;
    color:white;
    width:85%;
    max-width:350px;
}

.card{
    background:#222;
    padding:40px;
    margin:25px auto;
    border-radius:12px;
    max-width:380px;
    cursor:pointer;
    transition:.6s;
}

.flipped{
    background:#f39c12;
    color:black;
}

.impostor{
    background:#e74c3c!important;
    color:white!important;
}

#timer{
    font-size:28px;
    margin-top:10px;
    display:none;
}

#endButtons{
    display:none;
    flex-direction:column;
    align-items:center;
}
</style>
</head>

<body>

<h1>🕵️ Detectiv Biblic</h1>

<div id="setup">
<h3>Număr jucători</h3>
<input type="number" id="playerCount" value="10" min="3">
<br>
<button onclick="createInputs()">Introdu nume</button>

<div id="players"></div>

<h3>Impostori (Profet fals)</h3>
<input type="number" id="impostors" value="2">

<h3>Timer (minute)</h3>
<input type="number" id="roundTimer" value="5">

<br>
<button onclick="startGame()">Start joc</button>
</div>

<div id="game" style="display:none;">

<h2 id="playerTurn"></h2>

<div id="card" class="card" onclick="revealRole()">
Apasă AICI ca să dezvălui rolul tău
</div>

<button id="nextBtn" onclick="nextPlayer()">Următorul jucător</button>

<div id="timerSection" style="display:none;">
<h3>⏱ Timer rundă</h3>
<div id="timer">00:00</div>
<button id="startTimerBtn" onclick="startTimer()">Start Timer</button>
</div>

<div id="endButtons">
<button onclick="revealAll()">Descoperă toți jucătorii</button>
<button onclick="newRound()">Începe joc nou</button>
</div>

</div>

<!-- AUDIO LOCAL -->
<audio id="dramaticSound" src="sounds/dramatic.mp3"></audio>
<audio id="endSound" src="sounds/final.mp3"></audio>

<script>

const characters=[
"David","Noe","Moise","Daniel","Iona","Estera",
"Iosif","Avraam","Iosua","Ilie","Rut","Ghedeon"
];

let players=[],roles=[];
let currentPlayer=0;
let revealed=false;
let timerInterval;
let roundMinutes=5;
let timeLeft=0;

/* AUDIO UNLOCK (IMPORTANT MOBILE) */
window.addEventListener('click',()=>{
 const a=document.getElementById("dramaticSound");
 a.play().then(()=>a.pause());
 const b=document.getElementById("endSound");
 b.play().then(()=>b.pause());
},{once:true});

function createInputs(){
 const count=document.getElementById("playerCount").value;
 const div=document.getElementById("players");
 const old=[];
 for(let i=0;i<count;i++){
   const el=document.getElementById("p"+i);
   old.push(el?el.value:"");
 }
 div.innerHTML="";
 for(let i=0;i<count;i++){
   div.innerHTML+=`<input id="p${i}" placeholder="Jucător ${i+1}" value="${old[i]||""}"><br>`;
 }
}

function shuffle(a){
 for(let i=a.length-1;i>0;i--){
  const j=Math.floor(Math.random()*(i+1));
  [a[i],a[j]]=[a[j],a[i]];
 }
}

function startGame(){

players=[];
const count=document.getElementById("playerCount").value;

for(let i=0;i<count;i++){
 players.push(document.getElementById("p"+i).value || "Jucător "+(i+1));
}

roundMinutes=parseInt(document.getElementById("roundTimer").value);

const impostorCount=parseInt(document.getElementById("impostors").value);
const word=characters[Math.floor(Math.random()*characters.length)];

roles=[];
players.forEach(()=>roles.push("Personajul este: "+word));

for(let i=0;i<impostorCount;i++){
 let r;
 do{r=Math.floor(Math.random()*roles.length);}
 while(roles[r]=="Ești un Profet fals 😈");
 roles[r]="Ești un Profet fals 😈";
}

shuffle(roles);

document.getElementById("setup").style.display="none";
document.getElementById("game").style.display="block";

currentPlayer=0;
revealed=false;

updateTurn();
}

function updateTurn(){
document.getElementById("playerTurn").innerText=
players[currentPlayer]+", e rândul tău";
}

function revealRole(){
if(revealed) return;

const card=document.getElementById("card");
card.innerText=roles[currentPlayer];

if(roles[currentPlayer].includes("Profet"))
 card.classList.add("impostor");
else
 card.classList.add("flipped");

document.getElementById("dramaticSound").play();
revealed=true;
}

function nextPlayer(){
if(!revealed) return alert("Dezvăluie rolul!");

const card=document.getElementById("card");
card.classList.remove("flipped","impostor");
card.innerText="Apasă AICI ca să dezvălui rolul tău";

revealed=false;
currentPlayer++;

if(currentPlayer>=players.length){

document.getElementById("playerTurn").innerText="Jocul poate începe 🎉";
document.getElementById("card").style.display="none";
document.getElementById("nextBtn").style.display="none";
document.getElementById("timerSection").style.display="block";
document.getElementById("endButtons").style.display="flex";
return;
}

updateTurn();
}

function startTimer(){

clearInterval(timerInterval);

timeLeft=roundMinutes*60;
document.getElementById("timer").style.display="block";
document.getElementById("startTimerBtn").style.display="none";

timerInterval=setInterval(()=>{
 timeLeft--;

 let m=Math.floor(timeLeft/60);
 let s=timeLeft%60;

 document.getElementById("timer").innerText=
 `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

 if(timeLeft<=0){
  clearInterval(timerInterval);
  document.getElementById("endSound").play();
  alert("Timpul s-a terminat!");
 }
},1000);
}

function revealAll(){
let text="";
players.forEach((p,i)=>text+=`${p} → ${roles[i]}\n`);
alert(text);
}

function newRound(){

clearInterval(timerInterval);

document.getElementById("timer").innerText="00:00";
document.getElementById("timer").style.display="none";
document.getElementById("startTimerBtn").style.display="inline-block";

document.getElementById("setup").style.display="block";
document.getElementById("game").style.display="none";

document.getElementById("card").style.display="block";
document.getElementById("nextBtn").style.display="inline-block";
document.getElementById("endButtons").style.display="none";
document.getElementById("timerSection").style.display="none";
}

</script>
</body>
</html>
