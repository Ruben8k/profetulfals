<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Detectiv Biblic</title>

<style>
* {
    box-sizing: border-box;
}

html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    overflow-x: hidden;
}

body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #111;
    color: white;
    padding: 15px;
    padding-left: max(15px, env(safe-area-inset-left));
    padding-right: max(15px, env(safe-area-inset-right));
    padding-top: max(15px, env(safe-area-inset-top));
    padding-bottom: max(15px, env(safe-area-inset-bottom));
    min-height: 100vh;
}

h1 {
    margin: 0 0 20px 0;
    font-size: 28px;
    padding: 0 10px;
}

h2 {
    margin: 10px 0;
    font-size: 20px;
    padding: 0 10px;
    word-wrap: break-word;
    overflow-wrap: break-word;
    hyphens: auto;
}

h3 {
    margin: 15px 0 8px 0;
    font-size: 16px;
}

input, select {
    font-size: 16px;
    padding: 12px;
    margin: 8px auto;
    border-radius: 8px;
    border: 1px solid #444;
    background: #1a1a1a;
    color: white;
    width: 90%;
    max-width: 350px;
    display: block;
}

input:focus, select:focus {
    outline: none;
    border-color: #f39c12;
    background: #222;
}

button {
    font-size: 16px;
    padding: 12px 15px;
    margin: 8px auto;
    border-radius: 8px;
    border: none;
    background: #222;
    color: white;
    width: 90%;
    max-width: 350px;
    cursor: pointer;
    display: block;
    transition: background 0.3s;
}

button:hover {
    background: #333;
}

button:active {
    background: #1a1a1a;
    transform: scale(0.98);
}

#langBtn {
    background: #1a1a3a;
    border: 1px solid #3366ff;
    margin-top: 20px;
}

#langBtn:hover {
    background: #2a2a4a;
    border-color: #5588ff;
}

#card {
    background: #1e3a8a; /* albastru */
    color: white;
    font-weight: bold;
}
    
.card {
    background: #222;
    padding: 30px 20px;
    margin: 20px auto;
    border-radius: 12px;
    width: 90%;
    max-width: 380px;
    cursor: pointer;
    transition: all 0.6s ease;
    word-wrap: break-word;
    overflow-wrap: break-word;
    hyphens: auto;
    min-height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
}

.card:active {
    transform: scale(0.95);
}

.flipped {
    background: #f39c12;
    color: black;
    font-weight: bold;
}

.impostor {
    background: #e74c3c !important;
    color: white !important;
    font-weight: bold;
}

#timer {
    font-size: 32px;
    font-weight: bold;
    margin: 15px 0;
    display: none;
    font-variant-numeric: tabular-nums;
}

#timer.expired {
    color: #e74c3c;
    animation: blink 0.5s infinite;
}

@keyframes blink {
    0%, 50% { opacity: 1; }
    51%, 100% { opacity: 0.5; }
}

#setup {
    padding: 10px 0;
    margin: 0 auto;
    max-width: 400px;
}

#players {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    margin: 15px 0;
}

#players input {
    margin: 4px auto;
}

#players br {
    display: none;
}

#game {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 15px;
    min-height: 100vh;
    padding-bottom: 30px;
    max-width: 400px;
    margin: 0 auto;
}

#playerTurn {
    width: 100%;
    padding: 0 10px;
}

#nextBtn {
    width: 90%;
    max-width: 350px;
}

#timerSection {
    display: none !important;
    width: 100%;
    text-align: center;
    padding: 20px 0;
}

#timerSection h3 {
    margin: 0 0 10px 0;
}

#timerSection.active {
    display: block !important;
}

#startTimerBtn {
    width: 90%;
    max-width: 350px;
}

#endButtons {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    width: 100%;
    padding: 20px 0;
}

#endButtons button {
    width: 90%;
    max-width: 350px;
}

/* Modal overlay */
#modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.85);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 15px;
    padding-left: max(15px, env(safe-area-inset-left));
    padding-right: max(15px, env(safe-area-inset-right));
    overflow-y: auto;
}

#modal.open {
    display: flex;
}

#modalBox {
    background: #222;
    border-radius: 14px;
    padding: 24px;
    max-width: 400px;
    width: 100%;
    text-align: left;
    max-height: 85vh;
    display: flex;
    flex-direction: column;
}

#modalBox h3 {
    margin: 0 0 16px 0;
    font-size: 20px;
    text-align: center;
}

#modalList {
    list-style: none;
    padding: 0;
    margin: 0;
    flex: 1;
    overflow-y: auto;
    max-height: 60vh;
    padding-right: 8px;
}

#modalList li {
    padding: 10px 0;
    border-bottom: 1px solid #333;
    font-size: 14px;
    word-wrap: break-word;
    overflow-wrap: break-word;
    hyphens: auto;
}

#modalList li:last-child {
    border-bottom: none;
}

.impostor-label {
    color: #e74c3c;
    font-weight: bold;
}

#modalClose {
    width: 100%;
    background: #f39c12;
    color: black;
    font-weight: bold;
    border-radius: 8px;
    padding: 12px;
    font-size: 16px;
    cursor: pointer;
    border: none;
    margin-top: 16px;
    margin-left: 0;
    margin-right: 0;
}

/* Scroll bar styling */
#modalList::-webkit-scrollbar {
    width: 6px;
}

#modalList::-webkit-scrollbar-track {
    background: #1a1a1a;
    border-radius: 3px;
}

#modalList::-webkit-scrollbar-thumb {
    background: #444;
    border-radius: 3px;
}

#modalList::-webkit-scrollbar-thumb:hover {
    background: #666;
}

/* Tablet (768px and up) */
@media (min-width: 768px) {
    body {
        padding: 20px;
        padding-left: max(20px, env(safe-area-inset-left));
        padding-right: max(20px, env(safe-area-inset-right));
    }

    h1 {
        font-size: 32px;
    }

    h2 {
        font-size: 24px;
    }

    input, select {
        font-size: 18px;
        padding: 14px;
        width: 85%;
        max-width: 400px;
    }

    button {
        font-size: 18px;
        padding: 14px;
        width: 85%;
        max-width: 400px;
    }

    .card {
        padding: 40px 30px;
        width: 85%;
        max-width: 420px;
        min-height: 140px;
        font-size: 20px;
    }

    #game {
        max-width: 500px;
    }

    #setup {
        max-width: 500px;
    }

    #endButtons button {
        width: 85%;
        max-width: 400px;
    }
}

/* Desktop (1024px and up) */
@media (min-width: 1024px) {
    body {
        padding: 30px;
    }

    input, select, button {
        font-size: 18px;
        max-width: 450px;
    }

    .card {
        max-width: 480px;
    }
}

/* Landscape mode */
@media (max-height: 600px) and (orientation: landscape) {
    body {
        padding: 10px;
        padding-left: max(10px, env(safe-area-inset-left));
        padding-right: max(10px, env(safe-area-inset-right));
        padding-top: max(10px, env(safe-area-inset-top));
    }

    h1 {
        margin: 0 0 10px 0;
        font-size: 24px;
    }

    .card {
        padding: 15px;
        margin: 10px auto;
        min-height: 100px;
    }

    button {
        padding: 10px;
        margin: 4px auto;
    }

    #endButtons {
        gap: 8px;
    }
}
</style>

// ========== FUNCȚIE HELPER I18N ==========
function t(key) {
  return i18n[state.language][key] || key;
}

// ========== ACTUALIZARE UI (CENTRALIZATĂ) ==========
function updateUI() {
  // Actualizează titluri și etichete
  document.getElementById("labelPlayerCount").textContent = t("labelPlayerCount");
  document.getElementById("btnCreateInputs").textContent = t("btnCreateInputs");
  document.getElementById("labelImpostors").textContent = t("labelImpostors");
  document.getElementById("labelCategory").textContent = t("labelCategory");
  document.getElementById("labelTimer").textContent = t("labelTimer");
  document.getElementById("btnStartGame").textContent = t("btnStartGame");
  document.getElementById("optCharacters").textContent = t("optCharacters");
  document.getElementById("optEvents").textContent = t("optEvents");
  document.getElementById("optVerses").textContent = t("optVerses");
  document.getElementById("nextBtn").textContent = t("nextBtn");
  document.getElementById("labelTimerSection").textContent = t("labelTimerSection");
  document.getElementById("startTimerBtn").textContent = t("startTimerBtn");
  document.getElementById("btnRevealAll").textContent = t("btnRevealAll");
  document.getElementById("btnNewRound").textContent = t("btnNewRound");
  document.getElementById("modalTitle").textContent = t("modalTitle");
  document.getElementById("modalClose").textContent = t("modalClose");

  // Actualizează butonul de limbă
  document.getElementById("langBtn").textContent = t("langToggle");

  // Dacă nu e joc în curs, actualizează cardului la starea inițială
  if (state.players.length === 0 || document.getElementById("game").style.display === "none") {
    document.getElementById("card").textContent = t("cardPrompt");
  }

  // Reactualizează placeholder-urile input-urilor
  updatePlayerPlaceholders();
}

// ========== ACTUALIZARE PLACEHOLDER-URI JUCĂTORI ==========
function updatePlayerPlaceholders() {
  const inputs = document.querySelectorAll("#players input");
  inputs.forEach((input, index) => {
    input.placeholder = `${t("playerPlaceholder")} ${index + 1}`;
  });
}

/**
 * Schimbă limba și actualizează interfața
 */
function toggleLanguage() {
  state.language = state.language === "ro" ? "en" : "ro";
  updateUI();
}

function createInputs() {
  const count = parseInt(document.getElementById("playerCount").value);

  if (isNaN(count) || count < 3) {
    alert(t("alertMin3"));
    return;
  }

  const div = document.getElementById("players");
  const old = [];
  for (let i = 0; i < count; i++) {
    const el = document.getElementById("p" + i);
    old.push(el ? el.value : "");
  }

  div.innerHTML = "";
  for (let i = 0; i < count; i++) {
    const input = document.createElement("input");
    input.id = "p" + i;
    input.placeholder = `${t("playerPlaceholder")} ${i + 1}`;
    input.value = old[i] || "";
    div.appendChild(input);
  }
}

function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
}

function startGame() {
  const count = parseInt(document.getElementById("playerCount").value);
  const impostorCount = parseInt(document.getElementById("impostors").value);

  // Validări
  if (isNaN(count) || count < 3) {
    alert(t("alertMin3"));
    return;
  }
  if (isNaN(impostorCount) || impostorCount < 1) {
    alert(t("alertMin1Impostor"));
    return;
  }

  state.players = [];
  for (let i = 0; i < count; i++) {
    const el = document.getElementById("p" + i);
    state.players.push(el ? (el.value.trim() || "Jucător " + (i + 1)) : "Jucător " + (i + 1));
  }

  state.roundMinutes = parseInt(document.getElementById("roundTimer").value) || 5;

  const selectedCategory = document.getElementById("category").value;
  const list = categories[selectedCategory][state.language];
  const word = list[Math.floor(Math.random() * list.length)];

  const wordPrefix = state.language === "ro" ? "Este vorba despre: " : "It is about: ";
  state.roles = state.players.map(() => wordPrefix + word);

  const impostorSlots = Math.min(impostorCount, state.players.length);

  // Candidati care nu au fost impostori runda trecuta
  let eligible = state.players
    .map((name, i) => ({ name, i }))
    .filter(p => !state.lastImpostors.includes(p.name));

  // Daca nu sunt destui candidati eligibili, completam cu restul
  if (eligible.length < impostorSlots) {
    const rest = state.players
      .map((name, i) => ({ name, i }))
      .filter(p => !eligible.find(e => e.i === p.i));
    eligible = [...eligible, ...rest];
  }

  shuffle(eligible);
  const chosen = eligible.slice(0, impostorSlots);
  
  const impostorText = state.language === "ro" ? "Ești un Profet fals 😈" : "You're a false prophet 😈";
  chosen.forEach(p => { state.roles[p.i] = impostorText; });
  state.lastImpostors = chosen.map(p => p.name);

  shuffle(state.roles);

  document.getElementById("setup").style.display = "none";
  document.getElementById("game").style.display = "flex";

  state.currentPlayer = 0;
  state.revealed = false;

  updateTurn();
}

function updateTurn() {
  document.getElementById("playerTurn").textContent =
    state.players[state.currentPlayer] + ", e rândul tău";
}

function revealRole() {
  if (state.revealed) return;

  const card = document.getElementById("card");
  card.textContent = state.roles[state.currentPlayer];

  const profetCheck = state.language === "ro" ? "Profet" : "prophet";
  if (state.roles[state.currentPlayer].includes(profetCheck))
    card.classList.add("impostor");
  else
    card.classList.add("flipped");

  document.getElementById("dramaticSound").play().catch(() => {});
  state.revealed = true;
}

function nextPlayer() {
  if (!state.revealed) {
    alert("Dezvăluie rolul!");
    return;
  }

  const card = document.getElementById("card");
  card.classList.remove("flipped", "impostor");
  card.textContent = "Apasă AICI ca să dezvălui rolul tău";

  state.revealed = false;
  state.currentPlayer++;

  if (state.currentPlayer >= state.players.length) {
    document.getElementById("playerTurn").textContent = "Jocul poate începe 🎉";
    document.getElementById("card").style.display = "none";
    document.getElementById("nextBtn").style.display = "none";
    document.getElementById("timerSection").classList.add("active");
    document.getElementById("endButtons").style.display = "flex";
    return;
  }

  updateTurn();
}

function startTimer() {
  clearInterval(state.timerInterval);

  const timerEl = document.getElementById("timer");
  timerEl.classList.remove("expired");
  state.timeLeft = state.roundMinutes * 60;
  timerEl.style.display = "block";
  document.getElementById("startTimerBtn").style.display = "none";

  state.timerInterval = setInterval(() => {
    state.timeLeft--;

    const m = Math.floor(state.timeLeft / 60);
    const s = state.timeLeft % 60;

    timerEl.textContent =
      `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;

    if (state.timeLeft <= 0) {
      clearInterval(state.timerInterval);
      timerEl.classList.add("expired");
      document.getElementById("endSound").play().catch(() => {});
      alert("Timpul s-a terminat!");
    }
  }, 1000);
}

function revealAll() {
  const list = document.getElementById("modalList");
  list.innerHTML = "";

  state.players.forEach((p, i) => {
    const li = document.createElement("li");
    const profetCheck = state.language === "ro" ? "Profet" : "prophet";
    const isImpostor = state.roles[i].includes(profetCheck);
    li.innerHTML = `<strong>${p}</strong> → <span class="${isImpostor ? 'impostor-label' : ''}">${state.roles[i]}</span>`;
    list.appendChild(li);
  });

  document.getElementById("modal").classList.add("open");
}

function closeModal() {
  document.getElementById("modal").classList.remove("open");
}

// Închide modal dacă se apasă în afara lui
document.getElementById("modal").addEventListener("click", function(e) {
  if (e.target === this) closeModal();
});

function newRound() {
  if (!confirm("Ești sigur că vrei să începi un joc nou? Jocul curent se va pierde.")) return;

  clearInterval(state.timerInterval);

  const timerEl = document.getElementById("timer");
  timerEl.textContent = "00:00";
  timerEl.style.display = "none";
  timerEl.classList.remove("expired");

  document.getElementById("startTimerBtn").style.display = "inline-block";
  document.getElementById("setup").style.display = "block";
  document.getElementById("game").style.display = "none";
  document.getElementById("card").style.display = "block";
  document.getElementById("nextBtn").style.display = "block";
  document.getElementById("endButtons").style.display = "none";
  document.getElementById("timerSection").classList.remove("active");
}

// ========== INIȚIALIZARE ==========
updateUI();

</script>
</body>
