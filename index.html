<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Detectiv Biblic</title>

<style>
/* ===== CSS EXACT NEMODIFICAT ===== */
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; width: 100%; overflow-x: hidden; }

body {
  font-family: Arial, sans-serif;
  text-align: center;
  background: #111;
  color: white;
  padding: 15px;
  padding-left: max(15px, env(safe-area-inset-left));
  padding-right: max(15px, env(safe-area-inset-right));
  padding-top: max(15px, env(safe-area-inset-top));
  padding-bottom: max(15px, env(safe-area-inset-bottom));
  min-height: 100vh;
}

h1 { margin: 0 0 20px 0; font-size: 28px; padding: 0 10px; }
h2 { margin: 10px 0; font-size: 20px; padding: 0 10px; word-wrap: break-word; overflow-wrap: break-word; hyphens: auto; }
h3 { margin: 15px 0 8px 0; font-size: 16px; }

input, select, button {
  font-size: 16px;
  padding: 12px;
  margin: 8px auto;
  border-radius: 8px;
  border: 1px solid #444;
  background: #1a1a1a;
  color: white;
  width: 90%;
  max-width: 350px;
  display: block;
}

button { cursor: pointer; transition: 0.3s; }
button:hover { background: #333; }
button:active { transform: scale(0.98); }

#card {
  background: #1e3a8a;
  color: white;
  font-weight: bold;
}

.card {
  background: #222;
  padding: 30px 20px;
  margin: 20px auto;
  border-radius: 12px;
  width: 90%;
  max-width: 380px;
  cursor: pointer;
  transition: all 0.6s ease;
  min-height: 120px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}

.flipped { background: #f39c12; color: black; }
.impostor { background: #e74c3c !important; }

#timer { font-size: 32px; font-weight: bold; display: none; }

#game { display: none; }
#timerSection { display: none; }
#timerSection.active { display: block; }
#endButtons { display: none; }
</style>
</head>

<body>

<h1 id="appTitle"></h1>

<div id="setup">
  <h3 id="labelPlayerCount"></h3>
  <input type="number" id="playerCount" value="10" min="3">

  <button id="btnCreateInputs" onclick="createInputs()"></button>
  <div id="players"></div>

  <h3 id="labelImpostors"></h3>
  <input type="number" id="impostors" value="2" min="1">

  <h3 id="labelCategory"></h3>
  <select id="category">
    <option value="characters" id="optCharacters"></option>
    <option value="events" id="optEvents"></option>
    <option value="verses" id="optVerses"></option>
  </select>

  <h3 id="labelTimer"></h3>
  <input type="number" id="roundTimer" value="5" min="1">

  <button id="btnStartGame" onclick="startGame()"></button>
  <button id="langBtn" onclick="toggleLanguage()"></button>
</div>

<div id="game">
  <h2 id="playerTurn"></h2>

  <div id="card" class="card" onclick="revealRole()"></div>

  <button id="nextBtn" onclick="nextPlayer()"></button>

  <div id="timerSection">
    <h3 id="labelTimerSection"></h3>
    <div id="timer">00:00</div>
    <button id="startTimerBtn" onclick="startTimer()"></button>
  </div>

  <div id="endButtons">
    <button id="btnRevealAll" onclick="revealAll()"></button>
    <button id="btnNewRound" onclick="newRound()"></button>
  </div>
</div>

<div id="modal">
  <div id="modalBox">
    <h3 id="modalTitle"></h3>
    <ul id="modalList"></ul>
    <button id="modalClose" onclick="closeModal()"></button>
  </div>
</div>

<audio id="dramaticSound" src="sounds/dramatic.mp3"></audio>
<audio id="endSound" src="sounds/final.mp3"></audio>

<script>

/* ================= I18N ================= */
const i18n = {
  ro: {
    title: "🕵️ Detectiv Biblic",
    labelPlayerCount: "Număr jucători",
    btnCreateInputs: "Introdu nume",
    labelImpostors: "Număr profeţi falşi",
    labelCategory: "Categorie joc",
    labelTimer: "Timp (minute)",
    btnStartGame: "Start joc",
    optCharacters: "Personaje biblice",
    optEvents: "Relatări biblice",
    optVerses: "Versete biblice",
    cardPrompt: "ÎNTOARCE CARTEA",
    nextBtn: "Următorul jucător",
    labelTimerSection: "⏱ Timer rundă",
    startTimerBtn: "Start Timp",
    btnRevealAll: "Descoperă toți jucătorii",
    btnNewRound: "Începe joc nou",
    modalTitle: "🔍 Rezultate",
    modalClose: "Închide",
    playerTurnSuffix: ", e rândul tău",
    playerReady: "Jocul poate începe 🎉",
    wordRolePrefix: "Este vorba despre: ",
    impostorRole: "Ești un Profet fals 😈",
    langToggle: "🇬🇧 English",
    alertMin3: "Minim 3 jucători!",
    alertMin1Impostor: "Trebuie cel puțin 1 impostor!",
    alertRevealRole: "Dezvăluie rolul!",
    alertTimeUp: "Timpul s-a terminat!",
    alertConfirmNewRound: "Ești sigur că vrei să începi un joc nou? Jocul curent se va pierde.",
    playerPlaceholder: "Jucător",
    playerDefault: "Jucător"
  },
  en: {
    title: "🕵️ Biblical Detective",
    labelPlayerCount: "Player count",
    btnCreateInputs: "Enter names",
    labelImpostors: "Number of false prophets",
    labelCategory: "Game category",
    labelTimer: "Time (minutes)",
    btnStartGame: "Start game",
    optCharacters: "Bible characters",
    optEvents: "Biblical events",
    optVerses: "Bible verses",
    cardPrompt: "TAP HERE",
    nextBtn: "Next player",
    labelTimerSection: "⏱ Round timer",
    startTimerBtn: "Start timer",
    btnRevealAll: "Reveal all players",
    btnNewRound: "New game",
    modalTitle: "🔍 Results",
    modalClose: "Close",
    playerTurnSuffix: ", it's your turn",
    playerReady: "Game can start 🎉",
    wordRolePrefix: "It is about: ",
    impostorRole: "You're a false prophet 😈",
    langToggle: "🇷🇴 Română",
    alertMin3: "Minimum 3 players!",
    alertMin1Impostor: "There must be at least 1 impostor!",
    alertRevealRole: "Reveal your role!",
    alertTimeUp: "Time is up!",
    alertConfirmNewRound: "Are you sure? Current game will be lost.",
    playerPlaceholder: "Player",
    playerDefault: "Player"
  }
};

const state = {
  players: [],
  roles: [],
  currentPlayer: 0,
  revealed: false,
  timerInterval: null,
  roundMinutes: 5,
  timeLeft: 0,
  lastImpostors: [],
  language: "ro"
};

/* ================= HELPER ================= */
function t(k){ return i18n[state.language][k] || k; }

/* ================= UI ================= */
function updateUI(){
  document.title = t("title");

  appTitle.textContent = t("title");
  labelPlayerCount.textContent = t("labelPlayerCount");
  btnCreateInputs.textContent = t("btnCreateInputs");
  labelImpostors.textContent = t("labelImpostors");
  labelCategory.textContent = t("labelCategory");
  labelTimer.textContent = t("labelTimer");
  btnStartGame.textContent = t("btnStartGame");

  optCharacters.textContent = t("optCharacters");
  optEvents.textContent = t("optEvents");
  optVerses.textContent = t("optVerses");

  nextBtn.textContent = t("nextBtn");
  labelTimerSection.textContent = t("labelTimerSection");
  startTimerBtn.textContent = t("startTimerBtn");
  btnRevealAll.textContent = t("btnRevealAll");
  btnNewRound.textContent = t("btnNewRound");
  modalTitle.textContent = t("modalTitle");
  modalClose.textContent = t("modalClose");

  langBtn.textContent = t("langToggle");

  if(!state.revealed) card.textContent = t("cardPrompt");

  updatePlayerPlaceholders();
}

function updatePlayerPlaceholders(){
  document.querySelectorAll("#players input")
  .forEach((i,idx)=>i.placeholder=`${t("playerPlaceholder")} ${idx+1}`);
}

/* ================= LANGUAGE ================= */
function toggleLanguage(){
  state.language = state.language === "ro" ? "en" : "ro";
  updateUI();
}

/* ================= INPUTS ================= */
function createInputs(){
  const count = +playerCount.value;
  if(count < 3) return alert(t("alertMin3"));

  const div = players;
  div.innerHTML = "";

  for(let i=0;i<count;i++){
    const input = document.createElement("input");
    input.id = "p"+i;
    input.placeholder = `${t("playerPlaceholder")} ${i+1}`;
    div.appendChild(input);
  }
}

/* ================= GAME ================= */
function startGame(){
  const count = +playerCount.value;
  const imp = +impostors.value;

  if(count<3) return alert(t("alertMin3"));
  if(imp<1) return alert(t("alertMin1Impostor"));

  state.players = [];
  for(let i=0;i<count;i++){
    const el = document.getElementById("p"+i);
    state.players.push(el?.value.trim() || `${t("playerDefault")} ${i+1}`);
  }

  state.roundMinutes = +roundTimer.value || 5;

  const list = categories[category.value][state.language];
  const word = list[Math.floor(Math.random()*list.length)];

  state.roles = state.players.map(()=>({
    type:"word",
    value: t("wordRolePrefix") + word
  }));

  let eligible = state.players.map((n,i)=>({n,i}))
    .filter(p=>!state.lastImpostors.includes(p.n));

  if(eligible.length < imp){
    eligible = state.players.map((n,i)=>({n,i}));
  }

  eligible.sort(()=>Math.random()-0.5);
  const chosen = eligible.slice(0,imp);

  chosen.forEach(p=>{
    state.roles[p.i] = {type:"impostor"};
  });

  state.lastImpostors = chosen.map(p=>p.n);

  setup.style.display="none";
  game.style.display="flex";

  state.currentPlayer=0;
  state.revealed=false;

  updateTurn();
}

/* ================= TURN ================= */
function updateTurn(){
  playerTurn.textContent =
    state.players[state.currentPlayer] + t("playerTurnSuffix");
}

/* ================= REVEAL ================= */
function revealRole(){
  if(state.revealed) return;

  const role = state.roles[state.currentPlayer];
  const card = document.getElementById("card");

  if(role.type === "impostor"){
    card.textContent = t("impostorRole");
    card.classList.add("impostor");
  } else {
    card.textContent = role.value;
    card.classList.add("flipped");
  }

  state.revealed = true;
  dramaticSound.play().catch(()=>{});
}

/* ================= NEXT ================= */
function nextPlayer(){
  if(!state.revealed) return alert(t("alertRevealRole"));

  card.classList.remove("flipped","impostor");
  card.textContent = t("cardPrompt");

  state.revealed=false;
  state.currentPlayer++;

  if(state.currentPlayer >= state.players.length){
    playerTurn.textContent = t("playerReady");
    card.style.display="none";
    nextBtn.style.display="none";
    timerSection.classList.add("active");
    endButtons.style.display="flex";
    return;
  }

  updateTurn();
}

/* ================= TIMER ================= */
function startTimer(){
  clearInterval(state.timerInterval);

  timerEl.classList.remove("expired");
  state.timeLeft = state.roundMinutes*60;

  timerEl.style.display="block";
  startTimerBtn.style.display="none";

  state.timerInterval = setInterval(()=>{
    state.timeLeft--;

    const m=Math.floor(state.timeLeft/60);
    const s=state.timeLeft%60;

    timerEl.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

    if(state.timeLeft<=0){
      clearInterval(state.timerInterval);
      timerEl.classList.add("expired");
      endSound.play().catch(()=>{});
      alert(t("alertTimeUp"));
    }
  },1000);
}

/* ================= MODAL ================= */
function revealAll(){
  modalList.innerHTML="";

  state.players.forEach((p,i)=>{
    const r = state.roles[i];
    const li=document.createElement("li");

    li.innerHTML = `<strong>${p}</strong> → ${
      r.type==="impostor"
        ? `<span class="impostor-label">${t("impostorRole")}</span>`
        : r.value
    }`;

    modalList.appendChild(li);
  });

  modal.classList.add("open");
}

function closeModal(){ modal.classList.remove("open"); }

/* ================= RESET ================= */
function newRound(){
  if(!confirm(t("alertConfirmNewRound"))) return;

  clearInterval(state.timerInterval);

  timerEl.textContent="00:00";
  timerEl.style.display="none";

  setup.style.display="block";
  game.style.display="none";
  card.style.display="block";
  nextBtn.style.display="block";
  endButtons.style.display="none";
  timerSection.classList.remove("active");
}

/* ================= INIT ================= */
updateUI();

</script>
</body>
</html>
