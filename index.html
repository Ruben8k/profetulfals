<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detectiv Biblic</title>

<style>
body{
    font-family:Arial;
    text-align:center;
    background:#111;
    color:white;
    margin:0;
    padding:60px 15px 15px;
}

#langToggle{
    position:fixed;
    top:15px;
    right:15px;
    z-index:200;
    background:#222;
    color:white;
    border:none;
    padding:10px 14px;
    border-radius:8px;
    cursor:pointer;
}

#langToggle:hover{
    background:#333;
}

button,input,select{
    font-size:18px;
    padding:10px;
    margin:8px;
    border-radius:8px;
    border:none;
}

button{
    background:#222;
    color:white;
    width:85%;
    max-width:350px;
    cursor:pointer;
}

button:hover{
    background:#333;
}

.card{
    background:#222;
    padding:40px;
    margin:25px auto;
    border-radius:12px;
    max-width:380px;
    cursor:pointer;
    transition:.6s;
}

.flipped{
    background:#f39c12;
    color:black;
}

.impostor{
    background:#e74c3c!important;
    color:white!important;
}

#timer{
    font-size:28px;
    margin-top:10px;
    display:none;
}

#timer.expired{
    color:#e74c3c;
}

#endButtons{
    display:none;
    flex-direction:column;
    align-items:center;
}

/* Modal overlay */
#modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.75);
    z-index:100;
    align-items:center;
    justify-content:center;
}

#modal.open{
    display:flex;
}

#modalBox{
    background:#222;
    border-radius:14px;
    padding:28px 24px;
    max-width:360px;
    width:90%;
    text-align:left;
}

#modalBox h3{
    margin:0 0 16px;
    font-size:20px;
    text-align:center;
}

#modalList{
    list-style:none;
    padding:0;
    margin:0 0 20px;
}

#modalList li{
    padding:8px 0;
    border-bottom:1px solid #333;
    font-size:16px;
}

#modalList li:last-child{
    border-bottom:none;
}

.impostor-label{
    color:#e74c3c;
    font-weight:bold;
}

#modalClose{
    width:100%;
    background:#f39c12;
    color:black;
    font-weight:bold;
    border-radius:8px;
    padding:12px;
    font-size:16px;
    cursor:pointer;
    border:none;
}
</style>
</head>

<body>

<button id="langToggle" type="button" onclick="toggleLanguage()"></button>

<h1 id="title"></h1>

<div id="setup">
<h3 id="labelPlayers"></h3>
<input type="number" id="playerCount" value="10" min="3">
<br>
<button id="btnCreateInputs" onclick="createInputs()"></button>

<div id="players"></div>

<h3 id="labelImpostors"></h3>
<input type="number" id="impostors" value="2" min="1">

<h3 id="labelCategory"></h3>
<select id="category">
  <option value="characters" id="optCharacters"></option>
  <option value="events" id="optEvents"></option>
  <option value="verses" id="optVerses"></option>
</select>

<h3 id="labelTimer"></h3>
<input type="number" id="roundTimer" value="5" min="1">

<br>
<button id="btnStartGame" onclick="startGame()"></button>
</div>

<div id="game" style="display:none;">

<h2 id="playerTurn"></h2>

<div id="card" class="card" onclick="revealRole()"></div>

<button id="nextBtn" onclick="nextPlayer()"></button>

<div id="timerSection" style="display:none;">
<h3 id="labelTimerSection"></h3>
<div id="timer">00:00</div>
<button id="startTimerBtn" onclick="startTimer()"></button>
</div>

<div id="endButtons">
<button id="btnRevealAll" onclick="revealAll()"></button>
<button id="btnNewRound" onclick="newRound()"></button>
</div>

</div>

<!-- Modal rezultate -->
<div id="modal">
  <div id="modalBox">
    <h3 id="modalTitle"></h3>
    <ul id="modalList"></ul>
    <button id="modalClose" onclick="closeModal()"></button>
  </div>
</div>

<!-- AUDIO LOCAL -->
<audio id="dramaticSound" src="sounds/dramatic.mp3"></audio>
<audio id="endSound" src="sounds/final.mp3"></audio>

<script>

const categories = {
characters: [
    "Sara",
    "Rebeca",
    "Iosua",
    "Daniel",
    "Iefta judecătorul",
    "Samson",
    "Abigail",
    "Neemia",
    "Saul din Tars",
    "Ioan Botezatorul",
    "Rut",
    "Maria mama lui Isus",
    "Lazăr",
    "Moise",
    "Avraam",
    "Isaac",
    "Iacov",
    "Iosif - fiul lui Iacob",
    "David",
    "Solomon",
    "Ilie",
    "Elisei",
    "Estera",
    "Iov",
    "Ezra",
    "Maria Magdalena",
    "Petru",
    "Pavel",
    "Timotei",
    "Manase",
    "Ahab",
    "Izabela",
    "Abel",
    "Noe",
    "Faraon",
    "Iuda Iscarioteanul",
    "Absalom","Cain",
    "Lot",
    "Ghedeon",
    "Marta",
    "Toma"
],
events: [
    "Penticosta din 33 e.n.",
    "Exodul din Egipt",
    "Căderea Ierihonului",
    "Arca lui Noe",
    "Trecerea Mării Roșii",
    "David și Goliat",
    "Nașterea lui Isus",
    "Învierea lui Isus",
    "Comemorarea morții lui Isus",
    "Turnul Babel",
    "Soția lui Lot se face stalp de sare",
    "Daniel in groapa cu lei",
    "Isus curăță templul de talhari",
    "Armaghedon",
    "Creerea pamantului",
    "Căderea lui Adam și Eva",
    "Cain il ucide pe Abel",
    "Potopul",
    "Distrugerea Sodomei si Gomorei",
    "Jertfirea lui Isaac",
    "Vanzarea lui Iosif in Egipt",
    "Cele 10 plagi ale Egiptului",
    "Vitelul de aur",
    "Sarpele de arama",
    "Ridicarea lui Ilie la cer",
    "Botezul lui Isus",
    "Ispitirea in pustiu",
    "Predica de pe munte",
    "Intrarea in Ierusalim",
    "Rugaciunea din Ghetsimani",
    "Tradarea lui Iuda",
    "Convertirea lui Saul",
    "Botezul eunucului etiopian",
    "Eliberarea lui Petru din inchisoare"
],
verses: [
"Ioan 3:16",
"Psalmul 37:29",
"Matei 5:3",
"Proverbe 3:5",
"Filipeni 4:6",
"Romani 8:38,39",
"Isaia 41:10",
"Psalmul 119:105",
"Matei 6:33",
"Faptele 20:35",
"2 Timotei 3:1-5",
"Daniel 2:44",
"2 Timotei 3:16, 17",
"Proverbele 3:5, 6",
"Matei 28:19, 20",
"Efeseni 5:22, 23",
"2 Petru 3:8",
"Eclesiastul 9:5",
"Psalmul 83:18",
"1 Ioan 4:8",
"Ioan 17:3",
"Ioan 5:28, 29",
"Matei 24:14",
"Romani 5:12",
"Iacov 4:8",
"Matei 6:9, 10",
"Isaia 55:11",
"Efeseni 5:33",
"Isaia 65:21-23",
"Ioan 13:35",
"Galateni 5:22, 23",
"Geneza 1:1",
"Revelatia 21:4"
]
};

const translations = {
  ro: {
    title: "Detectiv Biblic",
    playersLabel: "Număr jucători",
    enterNames: "Introdu nume",
    impostorsLabel: "Număr profeţi falși",
    categoryLabel: "Categorie joc",
    timerLabel: "Timp (minute)",
    startGame: "Start joc",
    cardPrompt: "Apasă AICI ca să dezvălui rolul tău",
    nextPlayer: "Următorul jucător",
    timerSection: "⏱ Timer rundă",
    startTimer: "Start Timp",
    revealAll: "Descoperă toți jucătorii",
    newRound: "Începe joc nou",
    modalResults: "🔍 Rezultate",
    close: "Închide",
    playerTurnSuffix: ", e rândul tău",
    ready: "Jocul poate începe 🎉",
    min3Players: "Minim 3 jucători!",
    min1Impostor: "Trebuie cel puțin 1 impostor!",
    revealRoleAlert: "Dezvăluie rolul!",
    timeUp: "Timpul s-a terminat!",
    confirmNewRound: "Ești sigur că vrei să începi un joc nou? Jocul curent se va pierde.",
    playerPlaceholder: "Jucător",
    languageToggle: "EN",
    categoryCharacters: "Personaje biblice",
    categoryEvents: "Relatări biblice",
    categoryVerses: "Versete biblice",
    wordRolePrefix: "Este vorba despre: ",
    impostorText: "Ești un Profet fals 😈"
  },
  en: {
    title: "Biblical Detective",
    playersLabel: "Player count",
    enterNames: "Enter names",
    impostorsLabel: "Number of false prophets",
    categoryLabel: "Game category",
    timerLabel: "Time (minutes)",
    startGame: "Start game",
    cardPrompt: "Tap HERE to reveal your role",
    nextPlayer: "Next player",
    timerSection: "⏱ Round timer",
    startTimer: "Start timer",
    revealAll: "Reveal all players",
    newRound: "New game",
    modalResults: "🔍 Results",
    close: "Close",
    playerTurnSuffix: ", it's your turn",
    ready: "Game can start 🎉",
    min3Players: "Minimum 3 players!",
    min1Impostor: "There must be at least 1 impostor!",
    revealRoleAlert: "Reveal your role!",
    timeUp: "Time is up!",
    confirmNewRound: "Are you sure you want to start a new game? Current game will be lost.",
    playerPlaceholder: "Player",
    languageToggle: "RO",
    categoryCharacters: "Bible characters",
    categoryEvents: "Biblical events",
    categoryVerses: "Bible verses",
    wordRolePrefix: "It is about: ",
    impostorText: "You're a false prophet 😈"
  }
};

// Stare centralizată cu track clar de roluri per jucător
const state = {
  players: [],
  isImpostorByIndex: [], // Array boolean: true = impostor, false = regular player
  currentPlayer: 0,
  revealed: false,
  timerInterval: null,
  roundMinutes: 5,
  timeLeft: 0,
  lastImpostors: [],
  word: "",
  language: "ro"
};

/* AUDIO UNLOCK (IMPORTANT MOBILE) */
window.addEventListener('click', () => {
  const a = document.getElementById("dramaticSound");
  a.play().then(() => a.pause()).catch(() => {});
  const b = document.getElementById("endSound");
  b.play().then(() => b.pause()).catch(() => {});
}, { once: true });

function createInputs() {
  const count = parseInt(document.getElementById("playerCount").value);

  if (isNaN(count) || count < 3) {
    alert(translations[state.language].min3Players);
    return;
  }

  const div = document.getElementById("players");
  const old = [];
  for (let i = 0; i < count; i++) {
    const el = document.getElementById("p" + i);
    old.push(el ? el.value : "");
  }

  div.innerHTML = "";
  for (let i = 0; i < count; i++) {
    const input = document.createElement("input");
    input.id = "p" + i;
    input.placeholder = `${translations[state.language].playerPlaceholder} ${i + 1}`;
    input.value = old[i] || "";
    div.appendChild(input);
    div.appendChild(document.createElement("br"));
  }
}

function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
}

function setLanguage(lang) {
  state.language = lang;
  document.documentElement.lang = lang;
  const t = translations[lang];

  document.title = t.title;
  document.getElementById("title").textContent = `🕵️ ${t.title}`;
  document.getElementById("labelPlayers").textContent = t.playersLabel;
  document.getElementById("btnCreateInputs").textContent = t.enterNames;
  document.getElementById("labelImpostors").textContent = t.impostorsLabel;
  document.getElementById("labelCategory").textContent = t.categoryLabel;
  document.getElementById("labelTimer").textContent = t.timerLabel;
  document.getElementById("btnStartGame").textContent = t.startGame;
  document.getElementById("labelTimerSection").textContent = t.timerSection;
  document.getElementById("startTimerBtn").textContent = t.startTimer;
  document.getElementById("btnRevealAll").textContent = t.revealAll;
  document.getElementById("btnNewRound").textContent = t.newRound;
  document.getElementById("modalTitle").textContent = t.modalResults;
  document.getElementById("modalClose").textContent = t.close;
  document.getElementById("langToggle").textContent = t.languageToggle;

  document.getElementById("optCharacters").textContent = t.categoryCharacters;
  document.getElementById("optEvents").textContent = t.categoryEvents;
  document.getElementById("optVerses").textContent = t.categoryVerses;

  updatePlayerPlaceholders();

  // Dacă jocul este în progres, actualizează cardurile și textele
  if (state.word && state.players.length > 0) {
    if (!state.revealed) {
      document.getElementById("card").textContent = t.cardPrompt;
    } else {
      // Regenerează textul cardului curent cu limba nouă
      document.getElementById("card").textContent = getRoleText(state.currentPlayer);
    }
    
    // Reîncarcă turnul dacă e valid
    if (state.currentPlayer < state.players.length) {
      updateTurn();
    } else if (state.currentPlayer >= state.players.length) {
      document.getElementById("playerTurn").textContent = t.ready;
    }
  } else {
    document.getElementById("card").textContent = t.cardPrompt;
  }
}

function toggleLanguage() {
  setLanguage(state.language === "ro" ? "en" : "ro");
}

function updatePlayerPlaceholders() {
  const inputs = document.querySelectorAll("#players input");
  inputs.forEach((input, index) => {
    input.placeholder = `${translations[state.language].playerPlaceholder} ${index + 1}`;
  });
}

/**
 * Obține textul rolului pentru jucătorul la index dat
 * în limba curentă, fără a modifica starea
 */
function getRoleText(playerIndex) {
  const t = translations[state.language];
  if (state.isImpostorByIndex[playerIndex]) {
    return t.impostorText;
  } else {
    return t.wordRolePrefix + state.word;
  }
}

function startGame() {
  const count = parseInt(document.getElementById("playerCount").value);
  const impostorCount = parseInt(document.getElementById("impostors").value);

  if (isNaN(count) || count < 3) {
    alert(translations[state.language].min3Players);
    return;
  }
  if (isNaN(impostorCount) || impostorCount < 1) {
    alert(translations[state.language].min1Impostor);
    return;
  }

  state.players = [];
  for (let i = 0; i < count; i++) {
    const el = document.getElementById("p" + i);
    state.players.push(el ? (el.value.trim() || `${translations[state.language].playerPlaceholder} ${i + 1}`) : `${translations[state.language].playerPlaceholder} ${i + 1}`);
  }

  state.roundMinutes = parseInt(document.getElementById("roundTimer").value) || 5;

  const selectedCategory = document.getElementById("category").value;
  const list = categories[selectedCategory];
  state.word = list[Math.floor(Math.random() * list.length)];

  // Inițializează array boolean pentru impostori (toți sunt regular players inițial)
  state.isImpostorByIndex = state.players.map(() => false);

  const impostorSlots = Math.min(impostorCount, state.players.length);

  // Candidati care nu au fost impostori runda trecuta
  let eligible = state.players
    .map((name, i) => ({ name, i }))
    .filter(p => !state.lastImpostors.includes(p.name));

  // Daca nu sunt destui candidati eligibili, completam cu restul
  if (eligible.length < impostorSlots) {
    const rest = state.players
      .map((name, i) => ({ name, i }))
      .filter(p => !eligible.find(e => e.i === p.i));
    eligible = [...eligible, ...rest];
  }

  // SHUFFLE doar pentru alegerea impostorilor
  shuffle(eligible);
  const chosen = eligible.slice(0, impostorSlots);
  
  // Marcheaza impostori pe index, fara shuffle pe roles
  chosen.forEach(p => { 
    state.isImpostorByIndex[p.i] = true;
  });
  state.lastImpostors = chosen.map(p => p.name);

  // NU shuffle state.isImpostorByIndex!
  // Impostori raman la index-urile lor aleși

  document.getElementById("setup").style.display = "none";
  document.getElementById("game").style.display = "block";

  state.currentPlayer = 0;
  state.revealed = false;

  updateTurn();
  document.getElementById("card").textContent = translations[state.language].cardPrompt;
}

function updateTurn() {
  document.getElementById("playerTurn").textContent =
    state.players[state.currentPlayer] + translations[state.language].playerTurnSuffix;
}

function revealRole() {
  if (state.revealed) return;

  const card = document.getElementById("card");
  card.textContent = getRoleText(state.currentPlayer);

  if (state.isImpostorByIndex[state.currentPlayer]) {
    card.classList.add("impostor");
  } else {
    card.classList.add("flipped");
  }

  document.getElementById("dramaticSound").play().catch(() => {});
  state.revealed = true;
}

function nextPlayer() {
  if (!state.revealed) {
    alert(translations[state.language].revealRoleAlert);
    return;
  }

  const card = document.getElementById("card");
  card.classList.remove("flipped", "impostor");
  card.textContent = translations[state.language].cardPrompt;

  state.revealed = false;
  state.currentPlayer++;

  if (state.currentPlayer >= state.players.length) {
    document.getElementById("playerTurn").textContent = translations[state.language].ready;
    document.getElementById("card").style.display = "none";
    document.getElementById("nextBtn").style.display = "none";
    document.getElementById("timerSection").style.display = "block";
    document.getElementById("endButtons").style.display = "flex";
    return;
  }

  updateTurn();
}

function startTimer() {
  clearInterval(state.timerInterval);

  const timerEl = document.getElementById("timer");
  timerEl.classList.remove("expired");
  state.timeLeft = state.roundMinutes * 60;
  timerEl.style.display = "block";
  document.getElementById("startTimerBtn").style.display = "none";

  state.timerInterval = setInterval(() => {
    state.timeLeft--;

    const m = Math.floor(state.timeLeft / 60);
    const s = state.timeLeft % 60;

    timerEl.textContent =
      `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;

    if (state.timeLeft <= 0) {
      clearInterval(state.timerInterval);
      timerEl.classList.add("expired");
      document.getElementById("endSound").play().catch(() => {});
      alert(translations[state.language].timeUp);
    }
  }, 1000);
}

function revealAll() {
  const list = document.getElementById("modalList");
  list.innerHTML = "";

  state.players.forEach((p, i) => {
    const li = document.createElement("li");
    const roleText = getRoleText(i);
    const isImpostor = state.isImpostorByIndex[i];
    li.innerHTML = `<strong>${p}</strong> → <span class="${isImpostor ? 'impostor-label' : ''}">${roleText}</span>`;
    list.appendChild(li);
  });

  document.getElementById("modal").classList.add("open");
}

function closeModal() {
  document.getElementById("modal").classList.remove("open");
}

document.getElementById("modal").addEventListener("click", function(e) {
  if (e.target === this) closeModal();
});

function newRound() {
  if (!confirm(translations[state.language].confirmNewRound)) return;

  clearInterval(state.timerInterval);

  const timerEl = document.getElementById("timer");
  timerEl.textContent = "00:00";
  timerEl.style.display = "none";
  timerEl.classList.remove("expired");

  document.getElementById("startTimerBtn").style.display = "inline-block";
  document.getElementById("setup").style.display = "block";
  document.getElementById("game").style.display = "none";
  document.getElementById("card").style.display = "block";
  document.getElementById("nextBtn").style.display = "inline-block";
  document.getElementById("endButtons").style.display = "none";
  document.getElementById("timerSection").style.display = "none";
  document.getElementById("card").textContent = translations[state.language].cardPrompt;
}

setLanguage(state.language);

</script>
</body>
</html>
