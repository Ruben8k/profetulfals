<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detectiv Biblic</title>

<style>
body{
    font-family:Arial;
    text-align:center;
    background:#111;
    color:white;
    margin:0;
    padding:15px;
}

button,input{
    font-size:18px;
    padding:10px;
    margin:8px;
    border-radius:8px;
    border:none;
}

button{
    background:#222;
    color:white;
    width:85%;
    max-width:350px;
}

.card{
    background:#222;
    padding:40px;
    margin:25px auto;
    border-radius:12px;
    max-width:380px;
    cursor:pointer;
    transition:.6s;
}

.flipped{
    background:#f39c12;
    color:black;
}

.impostor{
    background:#e74c3c!important;
    color:white!important;
}

#timer{
    font-size:28px;
    margin-top:10px;
    display:none;
}

#endButtons{
    display:none;
    flex-direction:column;
    align-items:center;
}
</style>
</head>

<body>

<h1>🕵️ Detectiv Biblic</h1>

<div id="setup">
<h3>Număr jucători</h3>
<input type="number" id="playerCount" value="10" min="3">
<br>
<button onclick="createInputs()">Introdu nume</button>

<div id="players"></div>

<h3>Impostori (Profet fals)</h3>
<input type="number" id="impostors" value="2">

<h3>Categorie joc</h3>
<select id="category">
  <option value="characters">Personaje biblice</option>
  <option value="events">Evenimente importante</option>
  <option value="verses">Versete biblice</option>
</select>

<h3>Timer (minute)</h3>
<input type="number" id="roundTimer" value="5">

<br>
<button onclick="startGame()">Start joc</button>
</div>

<div id="game" style="display:none;">

<h2 id="playerTurn"></h2>

<div id="card" class="card" onclick="revealRole()">
Apasă AICI ca să dezvălui rolul tău
</div>

<button id="nextBtn" onclick="nextPlayer()">Următorul jucător</button>

<div id="timerSection" style="display:none;">
<h3>⏱ Timer rundă</h3>
<div id="timer">00:00</div>
<button id="startTimerBtn" onclick="startTimer()">Start Timer</button>
</div>

<div id="endButtons">
<button onclick="revealAll()">Descoperă toți jucătorii</button>
<button onclick="newRound()">Începe joc nou</button>
</div>

</div>

<!-- AUDIO LOCAL -->
<audio id="dramaticSound" src="sounds/dramatic.mp3"></audio>
<audio id="endSound" src="sounds/final.mp3"></audio>

<script>

const categories = {

characters: [
"Sara","Rebeca","Iosua","Daniel","Iefta","Samson",
"Abigail","Neemia","Saul din Tars","Ioan Botezatorul","Rut","Maria mama lui Isus","Lazar","Moise"
],

events: [
"Penticosta din 33 e.n.","Exodul din Egipt","Căderea Ierihonului",
"Arca lui Noe","Trecerea Mării Roșii",
"David și Goliat","Nașterea lui Isus",
"Învierea lui Isus","Comemorarea mortii lui Isus","Turnul Babel",
"Sara se face stalp de sare","Daniel in groapa cu lei",
"Isus curata templul de talhari","Armaghedon"
],

verses: [
"Ioan 3:16",
"Psalmul 37:29",
"Matei 5:3",
"Proverbe 3:5",
"Filipeni 4:6",
"Romani 8:38,39",
"Isaia 41:10",
"Psalmul 119:105",
"Matei 6:33",
"Revelatia 21:4"
]

};

let players=[],roles=[];
let currentPlayer=0;
let revealed=false;
let timerInterval;
let roundMinutes=5;
let timeLeft=0;

/* AUDIO UNLOCK (IMPORTANT MOBILE) */
window.addEventListener('click',()=>{
 const a=document.getElementById("dramaticSound");
 a.play().then(()=>a.pause());
 const b=document.getElementById("endSound");
 b.play().then(()=>b.pause());
},{once:true});

function createInputs(){
 const count=document.getElementById("playerCount").value;
 const div=document.getElementById("players");
 const old=[];
 for(let i=0;i<count;i++){
   const el=document.getElementById("p"+i);
   old.push(el?el.value:"");
 }
 div.innerHTML="";
 for(let i=0;i<count;i++){
   div.innerHTML+=`<input id="p${i}" placeholder="Jucător ${i+1}" value="${old[i]||""}"><br>`;
 }
}

function shuffle(a){
 for(let i=a.length-1;i>0;i--){
  const j=Math.floor(Math.random()*(i+1));
  [a[i],a[j]]=[a[j],a[i]];
 }
}

function startGame(){

players=[];
const count=document.getElementById("playerCount").value;

for(let i=0;i<count;i++){
 players.push(document.getElementById("p"+i).value || "Jucător "+(i+1));
}

roundMinutes=parseInt(document.getElementById("roundTimer").value);

const impostorCount=parseInt(document.getElementById("impostors").value);
const selectedCategory =
document.getElementById("category").value;

const list = categories[selectedCategory];

const word = list[Math.floor(Math.random()*list.length)];

roles=[];
players.forEach(()=>roles.push("Este vorba despre: "+word));

for(let i=0;i<impostorCount;i++){
 let r;
 do{r=Math.floor(Math.random()*roles.length);}
 while(roles[r]=="Ești un Profet fals 😈");
 roles[r]="Ești un Profet fals 😈";
}

shuffle(roles);

document.getElementById("setup").style.display="none";
document.getElementById("game").style.display="block";

currentPlayer=0;
revealed=false;

updateTurn();
}

function updateTurn(){
document.getElementById("playerTurn").innerText=
players[currentPlayer]+", e rândul tău";
}

function revealRole(){
if(revealed) return;

const card=document.getElementById("card");
card.innerText=roles[currentPlayer];

if(roles[currentPlayer].includes("Profet"))
 card.classList.add("impostor");
else
 card.classList.add("flipped");

document.getElementById("dramaticSound").play();
revealed=true;
}

function nextPlayer(){
if(!revealed) return alert("Dezvăluie rolul!");

const card=document.getElementById("card");
card.classList.remove("flipped","impostor");
card.innerText="Apasă AICI ca să dezvălui rolul tău";

revealed=false;
currentPlayer++;

if(currentPlayer>=players.length){

document.getElementById("playerTurn").innerText="Jocul poate începe 🎉";
document.getElementById("card").style.display="none";
document.getElementById("nextBtn").style.display="none";
document.getElementById("timerSection").style.display="block";
document.getElementById("endButtons").style.display="flex";
return;
}

updateTurn();
}

function startTimer(){

clearInterval(timerInterval);

timeLeft=roundMinutes*60;
document.getElementById("timer").style.display="block";
document.getElementById("startTimerBtn").style.display="none";

timerInterval=setInterval(()=>{
 timeLeft--;

 let m=Math.floor(timeLeft/60);
 let s=timeLeft%60;

 document.getElementById("timer").innerText=
 `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

 if(timeLeft<=0){
  clearInterval(timerInterval);
  document.getElementById("endSound").play();
  alert("Timpul s-a terminat!");
 }
},1000);
}

function revealAll(){
let text="";
players.forEach((p,i)=>text+=`${p} → ${roles[i]}\n`);
alert(text);
}

function newRound(){

clearInterval(timerInterval);

document.getElementById("timer").innerText="00:00";
document.getElementById("timer").style.display="none";
document.getElementById("startTimerBtn").style.display="inline-block";

document.getElementById("setup").style.display="block";
document.getElementById("game").style.display="none";

document.getElementById("card").style.display="block";
document.getElementById("nextBtn").style.display="inline-block";
document.getElementById("endButtons").style.display="none";
document.getElementById("timerSection").style.display="none";
}

</script>
</body>
</html>
