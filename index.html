<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detectiv Biblic</title>

<style>
body{
    font-family:'Segoe UI',sans-serif;
    text-align:center;
    background:linear-gradient(135deg,#1a1a1a,#2c3e50);
    color:white;
}

button,input,select{
    font-size:18px;
    padding:10px;
    margin:8px;
    border-radius:8px;
    border:none;
}

button{
    background:linear-gradient(135deg,#3498db,#2980b9);
    color:white;
    width:85%;
    max-width:350px;
    cursor:pointer;
    border-radius:12px;
    font-weight:bold;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

.card{
  perspective:1000px;
  width:300px;
  height:200px;
  margin:20px auto;
}

.card-inner{
  position:relative;
  width:100%;
  height:100%;
  transition:transform 0.6s;
  transform-style:preserve-3d;
}

.card.flipped .card-inner{
  transform:rotateY(180deg);
}

.card-front,.card-back{
  position:absolute;
  width:100%;
  height:100%;
  border-radius:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  backface-visibility:hidden;
  padding:20px;
}

.card-back{
  transform:rotateY(180deg);
  background:linear-gradient(135deg,#f39c12,#f1c40f);
  color:black;
}

#langBox{
  position:fixed;
  top:10px;
  right:10px;
}
</style>
</head>

<body>

<div id="langBox">
  <button onclick="setLanguage('ro')">RO</button>
  <button onclick="setLanguage('en')">EN</button>
</div>

<h1 id="title"></h1>

<div id="setup">
<h3 id="playersLabel"></h3>
<input type="number" id="playerCount" value="5">
<br>
<button onclick="createInputs()" id="btnNames"></button>

<div id="players"></div>

<h3 id="impostorsLabel"></h3>
<input type="number" id="impostors" value="1">

<h3 id="timerLabel"></h3>
<input type="number" id="roundTimer" value="5">

<br>
<button onclick="startGame()" id="startBtn"></button>
</div>

<div id="game" style="display:none;">

<h2 id="playerTurn"></h2>

<div class="card" onclick="revealRole()">
  <div class="card-inner">
    <div class="card-front" id="cardFront"></div>
    <div class="card-back" id="cardBack"></div>
  </div>
</div>

<button id="nextBtn" onclick="nextPlayer()"></button>

</div>

<script>

/* 🌍 TRANSLATIONS */
const t = {
  ro:{
    title:"🕵️ Detectiv Biblic",
    players:"Număr jucători",
    enter:"Introdu nume",
    impostors:"Număr profeţi falşi",
    timer:"Timp (minute)",
    start:"Start joc",
    next:"Următorul jucător",
    reveal:"Apasă AICI",
    turn:"e rândul tău",
    gameStart:"Jocul poate începe 🎉",
    alert:"Dezvăluie rolul!"
  },
  en:{
    title:"🕵️ Bible Detective",
    players:"Number of players",
    enter:"Enter names",
    impostors:"Number of impostors",
    timer:"Time (minutes)",
    start:"Start game",
    next:"Next player",
    reveal:"Tap HERE",
    turn:"it's your turn",
    gameStart:"The game can start 🎉",
    alert:"Reveal your role!"
  }
};

let lang = localStorage.getItem("lang") || "ro";

/* 🌍 APPLY LANGUAGE LIVE (FĂRĂ RESET) */
function applyLanguage(){
  const tr = t[lang];

  document.getElementById("title").textContent = tr.title;
  document.getElementById("playersLabel").textContent = tr.players;
  document.getElementById("btnNames").textContent = tr.enter;
  document.getElementById("impostorsLabel").textContent = tr.impostors;
  document.getElementById("timerLabel").textContent = tr.timer;
  document.getElementById("startBtn").textContent = tr.start;
  document.getElementById("nextBtn").textContent = tr.next;
  document.getElementById("cardFront").textContent = tr.reveal;

  updateTurn();
}

/* 🌍 CHANGE LANGUAGE */
function setLanguage(l){
  lang = l;
  localStorage.setItem("lang",l);
  applyLanguage();
}

/* INIT */
applyLanguage();

/* GAME STATE */
let players=[],roles=[],current=0,revealed=false;

function createInputs(){
  const count=document.getElementById("playerCount").value;
  const div=document.getElementById("players");
  div.innerHTML="";

  for(let i=0;i<count;i++){
    let input=document.createElement("input");
    input.placeholder="Player "+(i+1);
    div.appendChild(input);
    div.appendChild(document.createElement("br"));
  }
}

function startGame(){
  const inputs=document.querySelectorAll("#players input");
  players=[...inputs].map((i,x)=>i.value||("Player "+(x+1)));

  roles=players.map(()=> "WORD");
  roles[0]="IMPOSTOR 😈";

  document.getElementById("setup").style.display="none";
  document.getElementById("game").style.display="block";

  updateTurn();
}

function updateTurn(){
  document.getElementById("playerTurn").textContent =
    players[current] + " " + t[lang].turn;
}

function revealRole(){
  if(revealed)return;

  document.getElementById("cardBack").textContent=roles[current];
  document.querySelector(".card").classList.add("flipped");
  revealed=true;
}

function nextPlayer(){
  if(!revealed){
    alert(t[lang].alert);
    return;
  }

  document.querySelector(".card").classList.remove("flipped");
  revealed=false;
  current++;

  if(current>=players.length){
    document.getElementById("playerTurn").textContent=t[lang].gameStart;
    return;
  }

  updateTurn();
}

</script>
</body>
</html>
