<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detectiv Biblic</title>

<style>
body{
    font-family:Arial;
    text-align:center;
    background:#111;
    color:white;
    margin:0;
    padding:15px;
}

button,input,select{
    font-size:18px;
    padding:10px;
    margin:8px;
    border-radius:8px;
    border:none;
}

button{
    background:#222;
    color:white;
    width:85%;
    max-width:350px;
    cursor:pointer;
}

button:hover{
    background:#333;
}

.card{
    background:#222;
    padding:40px;
    margin:25px auto;
    border-radius:12px;
    max-width:380px;
    cursor:pointer;
    transition:.6s;
}

.flipped{
    background:#f39c12;
    color:black;
}

.impostor{
    background:#e74c3c!important;
    color:white!important;
}

#timer{
    font-size:28px;
    margin-top:10px;
    display:none;
}

#timer.expired{
    color:#e74c3c;
}

#endButtons{
    display:none;
    flex-direction:column;
    align-items:center;
}

/* Modal overlay */
#modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.75);
    z-index:100;
    align-items:center;
    justify-content:center;
}

#modal.open{
    display:flex;
}

#modalBox{
    background:#222;
    border-radius:14px;
    padding:28px 24px;
    max-width:360px;
    width:90%;
    text-align:left;
}

#modalBox h3{
    margin:0 0 16px;
    font-size:20px;
    text-align:center;
}

#modalList{
    list-style:none;
    padding:0;
    margin:0 0 20px;
}

#modalList li{
    padding:8px 0;
    border-bottom:1px solid #333;
    font-size:16px;
}

#modalList li:last-child{
    border-bottom:none;
}

.impostor-label{
    color:#e74c3c;
    font-weight:bold;
}

#modalClose{
    width:100%;
    background:#f39c12;
    color:black;
    font-weight:bold;
    border-radius:8px;
    padding:12px;
    font-size:16px;
    cursor:pointer;
    border:none;
}
</style>
</head>

<body>

<h1>🕵️ Detectiv Biblic</h1>

<div id="setup">
<h3>Număr jucători</h3>
<input type="number" id="playerCount" value="10" min="3">
<br>
<button onclick="createInputs()">Introdu nume</button>

<div id="players"></div>

<h3>Impostori (Profet fals)</h3>
<input type="number" id="impostors" value="2" min="1">

<h3>Categorie joc</h3>
<select id="category">
  <option value="characters">Personaje biblice</option>
  <option value="events">Relatari biblice</option>
  <option value="verses">Versete biblice</option>
</select>

<h3>Timer (minute)</h3>
<input type="number" id="roundTimer" value="5" min="1">

<br>
<button onclick="startGame()">Start joc</button>
</div>

<div id="game" style="display:none;">

<h2 id="playerTurn"></h2>

<div id="card" class="card" onclick="revealRole()">
Apasă AICI ca să dezvălui rolul tău
</div>

<button id="nextBtn" onclick="nextPlayer()">Următorul jucător</button>

<div id="timerSection" style="display:none;">
<h3>⏱ Timer rundă</h3>
<div id="timer">00:00</div>
<button id="startTimerBtn" onclick="startTimer()">Start Timer</button>
</div>

<div id="endButtons">
<button onclick="revealAll()">Descoperă toți jucătorii</button>
<button onclick="newRound()">Începe joc nou</button>
</div>

</div>

<!-- Modal rezultate -->
<div id="modal">
  <div id="modalBox">
    <h3>🔍 Rezultate</h3>
    <ul id="modalList"></ul>
    <button id="modalClose" onclick="closeModal()">Închide</button>
  </div>
</div>

<!-- AUDIO LOCAL -->
<audio id="dramaticSound" src="sounds/dramatic.mp3"></audio>
<audio id="endSound" src="sounds/final.mp3"></audio>

<script>

const categories = {

characters: [
"Sara","Rebeca","Iosua","Daniel","Iefta","Samson",
"Abigail","Neemia","Saul din Tars","Ioan Botezatorul","Rut","Maria mama lui Isus","Lazar","Moise"
],

events: [
"Penticosta din 33 e.n.","Exodul din Egipt","Căderea Ierihonului",
"Arca lui Noe","Trecerea Mării Roșii",
"David și Goliat","Nașterea lui Isus",
"Învierea lui Isus","Comemorarea mortii lui Isus","Turnul Babel",
"Sotia lui Lot se face stalp de sare","Daniel in groapa cu lei",
"Isus curata templul de talhari","Armaghedon"
],

verses: [
"Ioan 3:16",
"Psalmul 37:29",
"Matei 5:3",
"Proverbe 3:5",
"Filipeni 4:6",
"Romani 8:38,39",
"Isaia 41:10",
"Psalmul 119:105",
"Matei 6:33",
"Revelatia 21:4"
]

};

// Stare centralizată
const state = {
  players: [],
  roles: [],
  currentPlayer: 0,
  revealed: false,
  timerInterval: null,
  roundMinutes: 5,
  timeLeft: 0,
  lastImpostors: []
};

/* AUDIO UNLOCK (IMPORTANT MOBILE) */
window.addEventListener('click', () => {
  const a = document.getElementById("dramaticSound");
  a.play().then(() => a.pause()).catch(() => {});
  const b = document.getElementById("endSound");
  b.play().then(() => b.pause()).catch(() => {});
}, { once: true });

function createInputs() {
  const count = parseInt(document.getElementById("playerCount").value);

  if (isNaN(count) || count < 3) {
    alert("Minim 3 jucători!");
    return;
  }

  const div = document.getElementById("players");
  const old = [];
  for (let i = 0; i < count; i++) {
    const el = document.getElementById("p" + i);
    old.push(el ? el.value : "");
  }

  div.innerHTML = "";
  for (let i = 0; i < count; i++) {
    const input = document.createElement("input");
    input.id = "p" + i;
    input.placeholder = "Jucător " + (i + 1);
    input.value = old[i] || "";
    div.appendChild(input);
    div.appendChild(document.createElement("br"));
  }
}

function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
}

function startGame() {
  const count = parseInt(document.getElementById("playerCount").value);
  const impostorCount = parseInt(document.getElementById("impostors").value);

  // Validări
  if (isNaN(count) || count < 3) {
    alert("Minim 3 jucători!");
    return;
  }
  if (isNaN(impostorCount) || impostorCount < 1) {
    alert("Trebuie cel puțin 1 impostor!");
    return;
  }

  state.players = [];
  for (let i = 0; i < count; i++) {
    const el = document.getElementById("p" + i);
    state.players.push(el ? (el.value.trim() || "Jucător " + (i + 1)) : "Jucător " + (i + 1));
  }

  state.roundMinutes = parseInt(document.getElementById("roundTimer").value) || 5;

  const selectedCategory = document.getElementById("category").value;
  const list = categories[selectedCategory];
  const word = list[Math.floor(Math.random() * list.length)];

  state.roles = state.players.map(() => "Este vorba despre: " + word);

  const impostorSlots = Math.min(impostorCount, state.players.length);

  // Candidati care nu au fost impostori runda trecuta
  let eligible = state.players
    .map((name, i) => ({ name, i }))
    .filter(p => !state.lastImpostors.includes(p.name));

  // Daca nu sunt destui candidati eligibili, completam cu restul
  if (eligible.length < impostorSlots) {
    const rest = state.players
      .map((name, i) => ({ name, i }))
      .filter(p => !eligible.find(e => e.i === p.i));
    eligible = [...eligible, ...rest];
  }

  shuffle(eligible);
  const chosen = eligible.slice(0, impostorSlots);
  chosen.forEach(p => { state.roles[p.i] = "Ești un Profet fals 😈"; });
  state.lastImpostors = chosen.map(p => p.name);

  shuffle(state.roles);

  document.getElementById("setup").style.display = "none";
  document.getElementById("game").style.display = "block";

  state.currentPlayer = 0;
  state.revealed = false;

  updateTurn();
}

function updateTurn() {
  document.getElementById("playerTurn").textContent =
    state.players[state.currentPlayer] + ", e rândul tău";
}

function revealRole() {
  if (state.revealed) return;

  const card = document.getElementById("card");
  card.textContent = state.roles[state.currentPlayer];

  if (state.roles[state.currentPlayer].includes("Profet"))
    card.classList.add("impostor");
  else
    card.classList.add("flipped");

  document.getElementById("dramaticSound").play().catch(() => {});
  state.revealed = true;
}

function nextPlayer() {
  if (!state.revealed) {
    alert("Dezvăluie rolul!");
    return;
  }

  const card = document.getElementById("card");
  card.classList.remove("flipped", "impostor");
  card.textContent = "Apasă AICI ca să dezvălui rolul tău";

  state.revealed = false;
  state.currentPlayer++;

  if (state.currentPlayer >= state.players.length) {
    document.getElementById("playerTurn").textContent = "Jocul poate începe 🎉";
    document.getElementById("card").style.display = "none";
    document.getElementById("nextBtn").style.display = "none";
    document.getElementById("timerSection").style.display = "block";
    document.getElementById("endButtons").style.display = "flex";
    return;
  }

  updateTurn();
}

function startTimer() {
  clearInterval(state.timerInterval);

  const timerEl = document.getElementById("timer");
  timerEl.classList.remove("expired");
  state.timeLeft = state.roundMinutes * 60;
  timerEl.style.display = "block";
  document.getElementById("startTimerBtn").style.display = "none";

  state.timerInterval = setInterval(() => {
    state.timeLeft--;

    const m = Math.floor(state.timeLeft / 60);
    const s = state.timeLeft % 60;

    timerEl.textContent =
      `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;

    if (state.timeLeft <= 0) {
      clearInterval(state.timerInterval);
      timerEl.classList.add("expired");
      document.getElementById("endSound").play().catch(() => {});
      alert("Timpul s-a terminat!");
    }
  }, 1000);
}

function revealAll() {
  const list = document.getElementById("modalList");
  list.innerHTML = "";

  state.players.forEach((p, i) => {
    const li = document.createElement("li");
    const isImpostor = state.roles[i].includes("Profet");
    li.innerHTML = `<strong>${p}</strong> → <span class="${isImpostor ? 'impostor-label' : ''}">${state.roles[i]}</span>`;
    list.appendChild(li);
  });

  document.getElementById("modal").classList.add("open");
}

function closeModal() {
  document.getElementById("modal").classList.remove("open");
}

// Închide modal dacă se apasă în afara lui
document.getElementById("modal").addEventListener("click", function(e) {
  if (e.target === this) closeModal();
});

function newRound() {
  if (!confirm("Ești sigur că vrei să începi un joc nou? Jocul curent se va pierde.")) return;

  clearInterval(state.timerInterval);

  const timerEl = document.getElementById("timer");
  timerEl.textContent = "00:00";
  timerEl.style.display = "none";
  timerEl.classList.remove("expired");

  document.getElementById("startTimerBtn").style.display = "inline-block";
  document.getElementById("setup").style.display = "block";
  document.getElementById("game").style.display = "none";
  document.getElementById("card").style.display = "block";
  document.getElementById("nextBtn").style.display = "inline-block";
  document.getElementById("endButtons").style.display = "none";
  document.getElementById("timerSection").style.display = "none";
}

</script>
</body>
</html>
